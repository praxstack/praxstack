<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1200 700"><defs><linearGradient id="bgGrad" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" stop-color="#0a0d12"/><stop offset="100%" stop-color="#05070a"/></linearGradient><linearGradient id="termBorder" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" stop-color="#00e5a0" stop-opacity=".6"/><stop offset="50%" stop-color="#21262d" stop-opacity="1"/><stop offset="100%" stop-color="#58a6ff" stop-opacity=".6"/></linearGradient><filter id="neonGreen" width="200%" height="200%" x="-50%" y="-50%"><feGaussianBlur result="blur" stdDeviation="3"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="neonBlue" width="200%" height="200%" x="-50%" y="-50%"><feGaussianBlur result="blur" stdDeviation="3"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter><pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse"><rect width="4" height="1" fill="#fff" opacity=".03"/></pattern><clipPath id="reveal1"><rect width="0" height="30" x="0" y="0"><animate fill="freeze" attributeName="width" begin="0.5s" dur="0.6s" from="0" to="600"/></rect></clipPath><clipPath id="reveal2"><rect width="0" height="30" x="0" y="30"><animate fill="freeze" attributeName="width" begin="1.2s" dur="0.5s" from="0" to="600"/></rect></clipPath></defs><style>@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-6px)}}@keyframes flicker{0%{opacity:1}50%{opacity:.8}}.mono{font-family:&apos;SF Mono&apos;,&apos;Fira Code&apos;,&apos;Cascadia Code&apos;,&apos;Consolas&apos;,monospace}.card{transform-box:fill-box;transform-origin:center;opacity:0}.card-1{animation:bootUp .6s cubic-bezier(.16,1,.3,1) 1.8s forwards,float 4s ease-in-out 1.8s infinite}.card-2{animation:bootUp .6s cubic-bezier(.16,1,.3,1) 2s forwards,float 4.5s ease-in-out 2s infinite}.card-3{animation:bootUp .6s cubic-bezier(.16,1,.3,1) 2.2s forwards,float 4.2s ease-in-out 2.2s infinite}.card-4{animation:bootUp .6s cubic-bezier(.16,1,.3,1) 2.4s forwards,float 4.8s ease-in-out 2.4s infinite}.traffic{animation:flicker 2s infinite}</style><rect width="100%" height="100%" fill="url(#bgGrad)"/><g transform="translate(60, 40)"><rect width="1080" height="620" fill="#0d1117" stroke="url(#termBorder)" stroke-width="2" rx="16"/><rect width="1080" height="620" fill="url(#scanlines)" pointer-events="none" rx="16"/><rect width="1080" height="45" fill="#161b22" rx="16"/><rect width="1080" height="20" y="25" fill="#161b22"/><line x1="0" x2="1080" y1="45" y2="45" stroke="#30363d" stroke-width="1"/><g transform="translate(25, 22)"><circle cx="0" cy="0" r="7" fill="#ff5f57" class="traffic"/><circle style="animation-delay:.3s" cx="25" cy="0" r="7" fill="#febc2e" class="traffic"/><circle style="animation-delay:.6s" cx="50" cy="0" r="7" fill="#28c840" class="traffic"/></g><text x="540" y="28" fill="#8b949e" class="mono" font-size="14" font-weight="600" text-anchor="middle">prakhar@sys: ~/metrics.log</text><g><g class="mono" font-size="18"><g clip-path="url(#reveal1)" transform="translate(40, 80)"><text x="0" y="20" fill="#00e5a0" filter="url(#neonGreen)">$ <tspan fill="#e6edf3">cat metrics.log | analyze_impact --visualize</tspan></text></g><g clip-path="url(#reveal2)" transform="translate(40, 80)"><text x="0" y="55" fill="#8b949e" font-size="14">&gt; Processing Amazon data (2022-2025)... OK.</text></g></g><g><g class="card card-1" transform="translate(40, 80) translate(0, 100)"><rect width="330" height="150" fill="#161b22" stroke="#21262d" stroke-width="1.5" rx="10"/><text x="25" y="60" fill="#00e5a0" class="mono" filter="url(#neonGreen)" font-size="48" font-weight="900">47%</text><text x="25" y="95" fill="#e6edf3" class="mono" font-size="14" font-weight="bold" letter-spacing="1">p90 LATENCY ↓</text><text x="25" y="120" fill="#8b949e" class="mono" font-size="13">1.1s → 0.59s</text><path fill="none" stroke="#00e5a0" stroke-linecap="round" stroke-width="3" d="M 200 40 L 240 60 L 280 110" opacity=".6"><animate fill="freeze" attributeName="stroke-dasharray" begin="2s" dur="2s" values="0,150; 150,0"/></path></g></g><g><g class="card card-2" transform="translate(40, 80) translate(360, 100)"><rect width="330" height="150" fill="#161b22" stroke="#21262d" stroke-width="1.5" rx="10"/><text x="25" y="60" fill="#58a6ff" class="mono" filter="url(#neonBlue)" font-size="48" font-weight="900">33%</text><text x="25" y="95" fill="#e6edf3" class="mono" font-size="14" font-weight="bold" letter-spacing="1">CONVERSION ↑</text><text x="25" y="120" fill="#8b949e" class="mono" font-size="13">SSR + API decoupling</text><rect width="80" height="80" x="200" y="40" fill="#58a6ff" opacity=".1"/><path fill="none" stroke="#58a6ff" stroke-linecap="round" stroke-width="3" d="M 200 110 L 230 80 L 250 90 L 280 40"/></g></g><g><g class="card card-3" transform="translate(40, 80) translate(0, 280)"><rect width="330" height="150" fill="#161b22" stroke="#21262d" stroke-width="1.5" rx="10"/><text x="25" y="60" fill="#00e5a0" class="mono" filter="url(#neonGreen)" font-size="48" font-weight="900">75%</text><text x="25" y="95" fill="#e6edf3" class="mono" font-size="14" font-weight="bold" letter-spacing="1">ON-CALL ↓</text><text x="25" y="120" fill="#8b949e" class="mono" font-size="13">20+ → ~5 per shift</text><g fill="#00e5a0" opacity=".4" transform="translate(200, 40)"><rect width="15" height="70" x="0" y="0"><animate fill="freeze" attributeName="height" begin="2.5s" dur="2s" values="70; 20"/></rect><rect width="15" height="70" x="25" y="0"><animate fill="freeze" attributeName="height" begin="2.7s" dur="2s" values="70; 40"/></rect><rect width="15" height="70" x="50" y="0"><animate fill="freeze" attributeName="height" begin="2.9s" dur="2s" values="70; 10"/></rect></g></g></g><g><g class="card card-4" transform="translate(40, 80) translate(360, 280)"><rect width="330" height="150" fill="#161b22" stroke="#21262d" stroke-width="1.5" rx="10"/><text x="25" y="60" fill="#58a6ff" class="mono" filter="url(#neonBlue)" font-size="48" font-weight="900">60%</text><text x="25" y="95" fill="#e6edf3" class="mono" font-size="14" font-weight="bold" letter-spacing="1">RENEWALS ↑</text><text x="25" y="120" fill="#8b949e" class="mono" font-size="13">Milestoning flows</text><circle cx="240" cy="70" r="35" fill="none" stroke="#21262d" stroke-width="8"/><circle cx="240" cy="70" r="35" fill="none" stroke="#58a6ff" stroke-dasharray="220" stroke-dashoffset="220" stroke-width="8" transform="rotate(-90 240 70)"><animate fill="freeze" attributeName="stroke-dashoffset" begin="3s" dur="1.5s" from="220" to="88"/></circle></g></g><text x="345" y="500" fill="#484f58" class="mono" font-size="14" font-weight="bold" text-anchor="middle" transform="translate(40, 80)">AMAZON PAY · TRAVEL · PAYMENTS [2022-2025]</text></g><g transform="translate(740, 80)"><line x1="0" x2="0" y1="20" y2="480" stroke="#21262d" stroke-dasharray="4 4" stroke-width="2"/><text x="170" y="20" fill="#8b949e" class="mono" font-size="12" font-weight="bold" letter-spacing="3" text-anchor="middle">SYSTEM_INTEGRITY</text><g transform="translate(170, 200)"><circle r="130" fill="none" stroke="#21262d" stroke-width="1"/><path fill="none" stroke="#00e5a0" stroke-width="2" d="M 0 -70 L 60 -35 L 60 35 L 0 70 L -60 35 L -60 -35 Z" filter="url(#neonGreen)"><animateTransform attributeName="transform" dur="15s" from="0 0 0" repeatCount="indefinite" to="360 0 0" type="rotate"/></path><path fill="none" stroke="#58a6ff" stroke-width="1.5" d="M 0 -40 L 34 -20 L 34 20 L 0 40 L -34 20 L -34 -20 Z" filter="url(#neonBlue)"><animateTransform attributeName="transform" dur="10s" from="360 0 0" repeatCount="indefinite" to="0 0 0" type="rotate"/></path><circle r="12" fill="#e6edf3" filter="url(#neonBlue)"><animate attributeName="r" dur="2s" repeatCount="indefinite" values="10; 15; 10"/><animate attributeName="opacity" dur="2s" repeatCount="indefinite" values="0.5; 1; 0.5"/></circle></g><g fill="#8b949e" class="mono" font-size="11" transform="translate(40, 420)"><text y="0">SYSTEM_OPTIMIZATION_SCORE</text><rect width="260" height="8" y="10" fill="#161b22" rx="4"/><rect width="0" height="8" y="10" fill="#00e5a0" filter="url(#neonGreen)" rx="4"><animate fill="freeze" attributeName="width" begin="3.5s" dur="2s" from="0" to="250"/></rect><text x="220" y="5" fill="#00e5a0" font-weight="bold">MAX</text><text y="45">DATABASE_DECOUPLING</text><rect width="260" height="8" y="55" fill="#161b22" rx="4"/><rect width="0" height="8" y="55" fill="#58a6ff" filter="url(#neonBlue)" rx="4"><animate fill="freeze" attributeName="width" begin="4s" dur="2s" from="0" to="230"/></rect></g></g></g></svg>