<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <defs>
    <radialGradient id="crt" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.015"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#ffffff" opacity="0.007"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feFlood flood-color="#00e5a0" flood-opacity="0.3"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowB">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feFlood flood-color="#58a6ff" flood-opacity="0.3"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="wc"><rect width="800" height="220" rx="8"/></clipPath>
  </defs>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) { .f { opacity: 1 !important; animation: none !important; } }
    .t { font-family: 'SF Mono','Fira Code','Cascadia Code','Consolas',monospace; }
    .f { opacity: 0; animation: fadeIn 0.4s ease-out forwards; }
  </style>

  <g clip-path="url(#wc)">
    <rect width="800" height="220" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
    <rect x="1" y="1" width="798" height="34" rx="7" fill="#161b22"/>
    <rect x="1" y="20" width="798" height="16" fill="#161b22"/>
    <line x1="0" y1="35" x2="800" y2="35" stroke="#21262d" stroke-width="0.5"/>
    <circle cx="20" cy="18" r="5" fill="#ff5f57" opacity="0.8"/>
    <circle cx="36" cy="18" r="5" fill="#febc2e" opacity="0.8"/>
    <circle cx="52" cy="18" r="5" fill="#28c840" opacity="0.8"/>
    <text x="400" y="22" text-anchor="middle" class="t" font-size="11" fill="#6e7681">metrics.log</text>
    <rect x="1" y="36" width="798" height="183" fill="url(#crt)"/>
    <rect x="1" y="36" width="798" height="183" fill="url(#scan)"/>

    <!-- Command -->
    <text x="24" y="62" class="t f" style="animation-delay:0.1s" font-size="13">
      <tspan fill="#00e5a0" filter="url(#glow)">$</tspan><tspan fill="#e6edf3"> cat metrics.log</tspan>
    </text>

    <!-- Card 1 — 47% -->
    <g class="f" style="animation-delay:0.3s">
      <rect x="24" y="82" width="178" height="95" rx="6" fill="#161b22" stroke="#21262d" stroke-width="0.5"/>
      <text x="113" y="120" text-anchor="middle" class="t" font-size="28" font-weight="700" fill="#00e5a0" filter="url(#glow)">47%</text>
      <text x="113" y="142" text-anchor="middle" class="t" font-size="9" fill="#6e7681" letter-spacing="1.5" font-weight="600">p90 LATENCY ↓</text>
      <text x="113" y="162" text-anchor="middle" class="t" font-size="9" fill="#484f58">1.1s → 0.59s</text>
    </g>

    <!-- Card 2 — 33% -->
    <g class="f" style="animation-delay:0.45s">
      <rect x="214" y="82" width="178" height="95" rx="6" fill="#161b22" stroke="#21262d" stroke-width="0.5"/>
      <text x="303" y="120" text-anchor="middle" class="t" font-size="28" font-weight="700" fill="#58a6ff" filter="url(#glowB)">33%</text>
      <text x="303" y="142" text-anchor="middle" class="t" font-size="9" fill="#6e7681" letter-spacing="1.5" font-weight="600">CONVERSION ↑</text>
      <text x="303" y="162" text-anchor="middle" class="t" font-size="9" fill="#484f58">SSR + API decoupling</text>
    </g>

    <!-- Card 3 — 75% -->
    <g class="f" style="animation-delay:0.6s">
      <rect x="404" y="82" width="178" height="95" rx="6" fill="#161b22" stroke="#21262d" stroke-width="0.5"/>
      <text x="493" y="120" text-anchor="middle" class="t" font-size="28" font-weight="700" fill="#00e5a0" filter="url(#glow)">75%</text>
      <text x="493" y="142" text-anchor="middle" class="t" font-size="9" fill="#6e7681" letter-spacing="1.5" font-weight="600">ON-CALL ↓</text>
      <text x="493" y="162" text-anchor="middle" class="t" font-size="9" fill="#484f58">20+ → ~5 per shift</text>
    </g>

    <!-- Card 4 — 60% -->
    <g class="f" style="animation-delay:0.75s">
      <rect x="594" y="82" width="178" height="95" rx="6" fill="#161b22" stroke="#21262d" stroke-width="0.5"/>
      <text x="683" y="120" text-anchor="middle" class="t" font-size="28" font-weight="700" fill="#58a6ff" filter="url(#glowB)">60%</text>
      <text x="683" y="142" text-anchor="middle" class="t" font-size="9" fill="#6e7681" letter-spacing="1.5" font-weight="600">RENEWALS ↑</text>
      <text x="683" y="162" text-anchor="middle" class="t" font-size="9" fill="#484f58">Milestoning flows</text>
    </g>

    <!-- Bottom line -->
    <line x1="24" y1="194" x2="776" y2="194" stroke="#21262d" stroke-width="0.3" class="f" style="animation-delay:0.9s"/>
    <text x="400" y="210" text-anchor="middle" class="t f" style="animation-delay:1s" font-size="9" fill="#30363d">Amazon · 2022-2025</text>
  </g>
</svg>
