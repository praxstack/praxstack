<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <defs>
    <radialGradient id="crt" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.015" />
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0" />
    </radialGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#ffffff" opacity="0.007" />
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b" />
      <feFlood flood-color="#00e5a0" flood-opacity="0.3" />
      <feComposite in2="b" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowB">
      <feGaussianBlur stdDeviation="3" result="b" />
      <feFlood flood-color="#58a6ff" flood-opacity="0.3" />
      <feComposite in2="b" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00e5a0" flood-opacity="0.08" />
    </filter>
    <filter id="cardShadowB">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#58a6ff" flood-opacity="0.08" />
    </filter>
    <linearGradient id="borderGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.2" />
    </linearGradient>
    <clipPath id="wc">
      <rect width="800" height="220" rx="8" />
    </clipPath>
  </defs>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1;
    transform: translateX(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform:
    scale(1); } }
    @keyframes numberGlow { 0%,100% { opacity: 1; } 50% { opacity: 0.7; filter: url(#glow)
    brightness(1.3); } }
    @keyframes numberGlowB { 0%,100% { opacity: 1; } 50% { opacity: 0.7; filter: url(#glowB)
    brightness(1.3); } }
    @keyframes cardHover { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px);
    } }
    @keyframes dotBounce { 0%,100% { r: 5; } 50% { r: 5.5; } }
    @keyframes borderPulse { 0%,100% { stroke-opacity: 0.3; } 50% { stroke-opacity: 0.7; } }
    @media (prefers-reduced-motion: reduce) { .f, .sl, .si { opacity: 1 !important; animation: none
    !important; transform: none !important; } }
    .t { font-family: 'SF Mono','Fira Code','Cascadia Code','Consolas',monospace; }
    .f { opacity: 0; animation: fadeIn 0.4s ease-out forwards; }
    .sl { opacity: 0; animation: slideInLeft 0.45s cubic-bezier(0.16,1,0.3,1) forwards; }
    .si { opacity: 0; animation: scaleIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
    .traffic { animation: dotBounce 2s ease-in-out infinite; }
    .card-float { animation: cardHover 4s ease-in-out infinite; }
    .num-glow { animation: numberGlow 3s ease-in-out infinite; }
    .num-glow-b { animation: numberGlowB 3s ease-in-out infinite; }
  </style>

  <g clip-path="url(#wc)">
    <rect width="800" height="220" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1" />
    <rect width="800" height="220" rx="8" fill="none" stroke="url(#borderGlow)" stroke-width="0.5"
      opacity="0">
      <animate attributeName="opacity" values="0;0.3;0" dur="5s" repeatCount="indefinite"
        begin="1.5s" />
    </rect>

    <rect x="1" y="1" width="798" height="34" rx="7" fill="#161b22" />
    <rect x="1" y="20" width="798" height="16" fill="#161b22" />
    <line x1="0" y1="35" x2="800" y2="35" stroke="#21262d" stroke-width="0.5" />
    <circle cx="20" cy="18" r="5" fill="#ff5f57" opacity="0.8" class="traffic" />
    <circle cx="36" cy="18" r="5" fill="#febc2e" opacity="0.8" class="traffic"
      style="animation-delay:0.3s" />
    <circle cx="52" cy="18" r="5" fill="#28c840" opacity="0.8" class="traffic"
      style="animation-delay:0.6s" />
    <text x="400" y="22" text-anchor="middle" class="t f" font-size="11" fill="#6e7681">metrics.log</text>
    <rect x="1" y="36" width="798" height="183" fill="url(#crt)" />
    <rect x="1" y="36" width="798" height="183" fill="url(#scan)" />

    <!-- Command — slide in -->
    <text x="24" y="62" class="t sl" style="animation-delay:0.1s" font-size="13">
      <tspan fill="#00e5a0" filter="url(#glow)">$</tspan>
      <tspan fill="#e6edf3"> cat metrics.log</tspan>
    </text>

    <!-- Card 1 — 47% — scale in with float -->
    <g class="si" style="animation-delay:0.35s">
      <g class="card-float" style="animation-delay:0s">
        <rect x="24" y="82" width="178" height="95" rx="6" fill="#161b22" stroke="#21262d"
          stroke-width="0.5" filter="url(#cardShadow)" />
        <rect x="24" y="82" width="178" height="95" rx="6" fill="none" stroke="#00e5a0"
          stroke-width="0.3" opacity="0">
          <animate attributeName="opacity" values="0;0.4;0" dur="4s" repeatCount="indefinite"
            begin="1.5s" />
        </rect>
        <text x="113" y="120" text-anchor="middle" class="t num-glow" font-size="28"
          font-weight="700" fill="#00e5a0" filter="url(#glow)" style="animation-delay:0.5s">47%</text>
        <text x="113" y="142" text-anchor="middle" class="t" font-size="9" fill="#6e7681"
          letter-spacing="1.5" font-weight="600">p90 LATENCY ↓</text>
        <text x="113" y="162" text-anchor="middle" class="t" font-size="9" fill="#484f58">1.1s →
          0.59s</text>
      </g>
    </g>

    <!-- Card 2 — 33% -->
    <g class="si" style="animation-delay:0.5s">
      <g class="card-float" style="animation-delay:1s">
        <rect x="214" y="82" width="178" height="95" rx="6" fill="#161b22" stroke="#21262d"
          stroke-width="0.5" filter="url(#cardShadowB)" />
        <rect x="214" y="82" width="178" height="95" rx="6" fill="none" stroke="#58a6ff"
          stroke-width="0.3" opacity="0">
          <animate attributeName="opacity" values="0;0.4;0" dur="4s" repeatCount="indefinite"
            begin="2s" />
        </rect>
        <text x="303" y="120" text-anchor="middle" class="t num-glow-b" font-size="28"
          font-weight="700" fill="#58a6ff" filter="url(#glowB)" style="animation-delay:1s">33%</text>
        <text x="303" y="142" text-anchor="middle" class="t" font-size="9" fill="#6e7681"
          letter-spacing="1.5" font-weight="600">CONVERSION ↑</text>
        <text x="303" y="162" text-anchor="middle" class="t" font-size="9" fill="#484f58">SSR + API
          decoupling</text>
      </g>
    </g>

    <!-- Card 3 — 75% -->
    <g class="si" style="animation-delay:0.65s">
      <g class="card-float" style="animation-delay:2s">
        <rect x="404" y="82" width="178" height="95" rx="6" fill="#161b22" stroke="#21262d"
          stroke-width="0.5" filter="url(#cardShadow)" />
        <rect x="404" y="82" width="178" height="95" rx="6" fill="none" stroke="#00e5a0"
          stroke-width="0.3" opacity="0">
          <animate attributeName="opacity" values="0;0.4;0" dur="4s" repeatCount="indefinite"
            begin="2.5s" />
        </rect>
        <text x="493" y="120" text-anchor="middle" class="t num-glow" font-size="28"
          font-weight="700" fill="#00e5a0" filter="url(#glow)" style="animation-delay:1.5s">75%</text>
        <text x="493" y="142" text-anchor="middle" class="t" font-size="9" fill="#6e7681"
          letter-spacing="1.5" font-weight="600">ON-CALL ↓</text>
        <text x="493" y="162" text-anchor="middle" class="t" font-size="9" fill="#484f58">20+ → ~5
          per shift</text>
      </g>
    </g>

    <!-- Card 4 — 60% -->
    <g class="si" style="animation-delay:0.8s">
      <g class="card-float" style="animation-delay:3s">
        <rect x="594" y="82" width="178" height="95" rx="6" fill="#161b22" stroke="#21262d"
          stroke-width="0.5" filter="url(#cardShadowB)" />
        <rect x="594" y="82" width="178" height="95" rx="6" fill="none" stroke="#58a6ff"
          stroke-width="0.3" opacity="0">
          <animate attributeName="opacity" values="0;0.4;0" dur="4s" repeatCount="indefinite"
            begin="3s" />
        </rect>
        <text x="683" y="120" text-anchor="middle" class="t num-glow-b" font-size="28"
          font-weight="700" fill="#58a6ff" filter="url(#glowB)" style="animation-delay:2s">60%</text>
        <text x="683" y="142" text-anchor="middle" class="t" font-size="9" fill="#6e7681"
          letter-spacing="1.5" font-weight="600">RENEWALS ↑</text>
        <text x="683" y="162" text-anchor="middle" class="t" font-size="9" fill="#484f58">Milestoning
          flows</text>
      </g>
    </g>

    <!-- Animated bottom line -->
    <line x1="24" y1="194" x2="776" y2="194" stroke="#21262d" stroke-width="0.3"
      stroke-dasharray="752" stroke-dashoffset="752">
      <animate attributeName="stroke-dashoffset" from="752" to="0" dur="0.8s" begin="1.2s"
        fill="freeze" />
    </line>
    <text x="400" y="210" text-anchor="middle" class="t f" style="animation-delay:1.4s"
      font-size="9" fill="#484f58">Amazon · 2022-2025</text>
  </g>
</svg>
