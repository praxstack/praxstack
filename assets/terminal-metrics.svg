<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="100%" height="100%" role="img" aria-labelledby="metrics-title metrics-desc">
  <title id="metrics-title">Impact metrics</title>
  <desc id="metrics-desc">Terminal-styled dashboard of impact metrics (downloads, stars, deploys).</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0d12" />
      <stop offset="100%" stop-color="#05070a" />
    </linearGradient>

    <linearGradient id="termBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#21262d" stop-opacity="1" />
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.6" />
    </linearGradient>

    <filter id="neonGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="neonBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#ffffff" opacity="0.03" />
    </pattern>

    <clipPath id="reveal1">
      <rect x="0" y="0" height="30" width="0">
        <animate attributeName="width" from="0" to="600" dur="0.6s" begin="0.5s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="reveal2">
      <rect x="0" y="30" height="30" width="0">
        <animate attributeName="width" from="0" to="600" dur="0.5s" begin="1.2s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

  <style>
    .mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace; }

    /* Animation Isolation Logic */
    @keyframes bootUp {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
    }
    @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.8; }
    }

    .card { transform-box: fill-box; transform-origin: center; opacity: 0; }
    .card-1 { animation: bootUp 0.6s cubic-bezier(0.16,1,0.3,1) 1.8s forwards, float 4s ease-in-out
    1.8s infinite; }
    .card-2 { animation: bootUp 0.6s cubic-bezier(0.16,1,0.3,1) 2.0s forwards, float 4.5s
    ease-in-out 2.0s infinite; }
    .card-3 { animation: bootUp 0.6s cubic-bezier(0.16,1,0.3,1) 2.2s forwards, float 4.2s
    ease-in-out 2.2s infinite; }
    .card-4 { animation: bootUp 0.6s cubic-bezier(0.16,1,0.3,1) 2.4s forwards, float 4.8s
    ease-in-out 2.4s infinite; }

    .traffic { animation: flicker 2s infinite; }
  </style>

  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <g transform="translate(60, 40)">
    <rect width="1080" height="620" rx="16" fill="#0d1117" stroke="url(#termBorder)"
      stroke-width="2" />
    <rect width="1080" height="620" rx="16" fill="url(#scanlines)" pointer-events="none" />

    <rect width="1080" height="45" rx="16" fill="#161b22" />
    <rect y="25" width="1080" height="20" fill="#161b22" />
    <line x1="0" y1="45" x2="1080" y2="45" stroke="#30363d" stroke-width="1" />

    <g transform="translate(25, 22)">
      <circle cx="0" cy="0" r="7" fill="#ff5f57" class="traffic" />
      <circle cx="25" cy="0" r="7" fill="#febc2e" class="traffic" style="animation-delay:0.3s" />
      <circle cx="50" cy="0" r="7" fill="#28c840" class="traffic" style="animation-delay:0.6s" />
    </g>

    <text x="540" y="28" text-anchor="middle" class="mono" font-size="14" fill="#8b949e"
      font-weight="600">
      prakhar@sys: ~/metrics.log
    </text>

    <g transform="translate(40, 80)">
      <g class="mono" font-size="18">
        <g clip-path="url(#reveal1)">
          <text x="0" y="20" fill="#00e5a0" filter="url(#neonGreen)">$ <tspan fill="#e6edf3">cat
            metrics.log | analyze_impact --visualize</tspan></text>
        </g>
        <g clip-path="url(#reveal2)">
          <text x="0" y="55" fill="#8b949e" font-size="14">> Processing Amazon data (2022-2025)...
            OK.</text>
        </g>
      </g>

      <g transform="translate(0, 100)">
        <g class="card card-1">
          <rect width="330" height="150" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1.5" />
          <text x="25" y="60" class="mono" font-size="48" font-weight="900" fill="#00e5a0"
            filter="url(#neonGreen)">47%</text>
          <text x="25" y="95" class="mono" font-size="14" fill="#e6edf3" font-weight="bold"
            letter-spacing="1">p90 LATENCY ↓</text>
          <text x="25" y="120" class="mono" font-size="13" fill="#8b949e">1.1s → 0.59s</text>
          <path d="M 200 40 L 240 60 L 280 110" fill="none" stroke="#00e5a0" stroke-width="3"
            stroke-linecap="round" opacity="0.6">
            <animate attributeName="stroke-dasharray" values="0,150; 150,0" dur="2s" begin="2s"
              fill="freeze" />
          </path>
        </g>
      </g>

      <g transform="translate(360, 100)">
        <g class="card card-2">
          <rect width="330" height="150" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1.5" />
          <text x="25" y="60" class="mono" font-size="48" font-weight="900" fill="#58a6ff"
            filter="url(#neonBlue)">33%</text>
          <text x="25" y="95" class="mono" font-size="14" fill="#e6edf3" font-weight="bold"
            letter-spacing="1">CONVERSION ↑</text>
          <text x="25" y="120" class="mono" font-size="13" fill="#8b949e">SSR + API decoupling</text>
          <rect x="200" y="40" width="80" height="80" fill="#58a6ff" opacity="0.1" />
          <path d="M 200 110 L 230 80 L 250 90 L 280 40" fill="none" stroke="#58a6ff"
            stroke-width="3" stroke-linecap="round" />
        </g>
      </g>

      <g transform="translate(0, 280)">
        <g class="card card-3">
          <rect width="330" height="150" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1.5" />
          <text x="25" y="60" class="mono" font-size="48" font-weight="900" fill="#00e5a0"
            filter="url(#neonGreen)">75%</text>
          <text x="25" y="95" class="mono" font-size="14" fill="#e6edf3" font-weight="bold"
            letter-spacing="1">ON-CALL ↓</text>
          <text x="25" y="120" class="mono" font-size="13" fill="#8b949e">20+ → ~5 per shift</text>
          <g transform="translate(200, 40)" fill="#00e5a0" opacity="0.4">
            <rect x="0" y="0" width="15" height="70">
              <animate attributeName="height" values="70; 20" dur="2s" fill="freeze" begin="2.5s" />
            </rect>
            <rect x="25" y="0" width="15" height="70">
              <animate attributeName="height" values="70; 40" dur="2s" fill="freeze" begin="2.7s" />
            </rect>
            <rect x="50" y="0" width="15" height="70">
              <animate attributeName="height" values="70; 10" dur="2s" fill="freeze" begin="2.9s" />
            </rect>
          </g>
        </g>
      </g>

      <g transform="translate(360, 280)">
        <g class="card card-4">
          <rect width="330" height="150" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1.5" />
          <text x="25" y="60" class="mono" font-size="48" font-weight="900" fill="#58a6ff"
            filter="url(#neonBlue)">60%</text>
          <text x="25" y="95" class="mono" font-size="14" fill="#e6edf3" font-weight="bold"
            letter-spacing="1">RENEWALS ↑</text>
          <text x="25" y="120" class="mono" font-size="13" fill="#8b949e">Milestoning flows</text>
          <circle cx="240" cy="70" r="35" fill="none" stroke="#21262d" stroke-width="8" />
          <circle cx="240" cy="70" r="35" fill="none" stroke="#58a6ff" stroke-width="8"
            stroke-dasharray="220" stroke-dashoffset="220" transform="rotate(-90 240 70)">
            <animate attributeName="stroke-dashoffset" from="220" to="88" dur="1.5s" fill="freeze"
              begin="3s" />
          </circle>
        </g>
      </g>

      <text x="345" y="500" text-anchor="middle" class="mono" font-size="14" fill="#484f58"
        font-weight="bold">
        AMAZON PAY · TRAVEL · PAYMENTS [2022-2025]
      </text>
    </g>

    <g transform="translate(740, 80)">
      <line x1="0" y1="20" x2="0" y2="480" stroke="#21262d" stroke-width="2" stroke-dasharray="4 4" />

      <text x="170" y="20" text-anchor="middle" font-size="12" class="mono" fill="#8b949e"
        font-weight="bold" letter-spacing="3">
        SYSTEM_INTEGRITY
      </text>

      <g transform="translate(170, 200)">
        <circle r="130" fill="none" stroke="#21262d" stroke-width="1" />
        <path d="M 0 -70 L 60 -35 L 60 35 L 0 70 L -60 35 L -60 -35 Z" fill="none" stroke="#00e5a0"
          stroke-width="2" filter="url(#neonGreen)">
          <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0"
            dur="15s" repeatCount="indefinite" />
        </path>
        <path d="M 0 -40 L 34 -20 L 34 20 L 0 40 L -34 20 L -34 -20 Z" fill="none" stroke="#58a6ff"
          stroke-width="1.5" filter="url(#neonBlue)">
          <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0"
            dur="10s" repeatCount="indefinite" />
        </path>

        <circle r="12" fill="#e6edf3" filter="url(#neonBlue)">
          <animate attributeName="r" values="10; 15; 10" dur="2s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="0.5; 1; 0.5" dur="2s" repeatCount="indefinite" />
        </circle>
      </g>

      <g transform="translate(40, 420)" class="mono" font-size="11" fill="#8b949e">
        <text y="0">SYSTEM_OPTIMIZATION_SCORE</text>
        <rect y="10" width="260" height="8" rx="4" fill="#161b22" />
        <rect y="10" width="0" height="8" rx="4" fill="#00e5a0" filter="url(#neonGreen)">
          <animate attributeName="width" from="0" to="250" dur="2s" begin="3.5s" fill="freeze" />
        </rect>
        <text x="220" y="5" fill="#00e5a0" font-weight="bold">MAX</text>

        <text y="45">DATABASE_DECOUPLING</text>
        <rect y="55" width="260" height="8" rx="4" fill="#161b22" />
        <rect y="55" width="0" height="8" rx="4" fill="#58a6ff" filter="url(#neonBlue)">
          <animate attributeName="width" from="0" to="230" dur="2s" begin="4s" fill="freeze" />
        </rect>
      </g>
    </g>
  </g>
</svg>
