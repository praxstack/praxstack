<svg xmlns="http://www.w3.org/2000/svg" width="800" height="330" viewBox="0 0 800 330">
  <defs>
    <radialGradient id="crt" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#ffffff" opacity="0.007"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feFlood flood-color="#00e5a0" flood-opacity="0.35"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="wc"><rect width="800" height="330" rx="8"/></clipPath>
  </defs>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse { 0%,100% { opacity: 0.85; } 50% { opacity: 0.12; } }
    @media (prefers-reduced-motion: reduce) {
      .f { opacity: 1 !important; animation: none !important; }
    }
    .t { font-family: 'SF Mono','Fira Code','Cascadia Code','Consolas',monospace; }
    .f { opacity: 0; animation: fadeIn 0.35s ease-out forwards; }
  </style>

  <g clip-path="url(#wc)">
    <!-- Window -->
    <rect width="800" height="330" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
    <!-- Title bar -->
    <rect x="1" y="1" width="798" height="34" rx="7" fill="#161b22"/>
    <rect x="1" y="20" width="798" height="16" fill="#161b22"/>
    <line x1="0" y1="35" x2="800" y2="35" stroke="#21262d" stroke-width="0.5"/>
    <!-- Traffic lights -->
    <circle cx="20" cy="18" r="5" fill="#ff5f57" opacity="0.8"/>
    <circle cx="36" cy="18" r="5" fill="#febc2e" opacity="0.8"/>
    <circle cx="52" cy="18" r="5" fill="#28c840" opacity="0.8"/>
    <!-- Title -->
    <text x="400" y="22" text-anchor="middle" class="t" font-size="11" fill="#6e7681">prakhar@dev ~/about</text>
    <!-- CRT effect -->
    <rect x="1" y="36" width="798" height="293" fill="url(#crt)"/>
    <rect x="1" y="36" width="798" height="293" fill="url(#scan)"/>

    <!-- $ whoami -->
    <text x="24" y="62" class="t f" style="animation-delay:0.1s" font-size="13">
      <tspan fill="#00e5a0" filter="url(#glow)">$</tspan><tspan fill="#e6edf3"> whoami</tspan>
    </text>

    <!-- Code block -->
    <text x="24" y="88" class="t f" style="animation-delay:0.2s" font-size="12">
      <tspan fill="#58a6ff">const</tspan><tspan fill="#e6edf3"> prakhar = {</tspan>
    </text>
    <text x="24" y="106" class="t f" style="animation-delay:0.3s" font-size="12">
      <tspan fill="#6e7681">  location:   </tspan><tspan fill="#00e5a0">"Bengaluru, India"</tspan><tspan fill="#6e7681">,</tspan>
    </text>
    <text x="24" y="124" class="t f" style="animation-delay:0.4s" font-size="12">
      <tspan fill="#6e7681">  experience: </tspan><tspan fill="#00e5a0">"3+ years — Amazon Payments &amp; Travel"</tspan><tspan fill="#6e7681">,</tspan>
    </text>
    <text x="24" y="142" class="t f" style="animation-delay:0.5s" font-size="12">
      <tspan fill="#6e7681">  seeking:    </tspan><tspan fill="#00e5a0">"SDE II / Senior SDE"</tspan><tspan fill="#6e7681">,</tspan>
    </text>
    <text x="24" y="160" class="t f" style="animation-delay:0.6s" font-size="12">
      <tspan fill="#6e7681">  education:  </tspan><tspan fill="#00e5a0">"MCA, MNNIT Prayagraj (9.25 GPA)"</tspan><tspan fill="#6e7681">,</tspan>
    </text>
    <text x="24" y="178" class="t f" style="animation-delay:0.7s" font-size="12">
      <tspan fill="#6e7681">  passions:   [</tspan><tspan fill="#00e5a0">"System Design"</tspan><tspan fill="#6e7681">, </tspan><tspan fill="#00e5a0">"Perf Eng"</tspan><tspan fill="#6e7681">, </tspan><tspan fill="#00e5a0">"Open Source"</tspan><tspan fill="#6e7681">],</tspan>
    </text>
    <text x="24" y="196" class="t f" style="animation-delay:0.8s" font-size="12" fill="#e6edf3">};</text>

    <!-- Divider -->
    <line x1="24" y1="214" x2="776" y2="214" stroke="#21262d" stroke-width="0.5" class="f" style="animation-delay:0.9s"/>

    <!-- Bio output -->
    <text x="24" y="236" class="t f" style="animation-delay:1.0s" font-size="11" fill="#7d8590">
      Results-driven engineer who shipped at Amazon scale — hotel booking
    </text>
    <text x="24" y="252" class="t f" style="animation-delay:1.05s" font-size="11" fill="#7d8590">
      platforms, payment orchestration, event-driven architectures. Cut p90
    </text>
    <text x="24" y="268" class="t f" style="animation-delay:1.1s" font-size="11" fill="#7d8590">
      latency <tspan fill="#00e5a0">47%</tspan>, boosted conversions <tspan fill="#00e5a0">33%</tspan>, built systems handling millions
    </text>
    <text x="24" y="284" class="t f" style="animation-delay:1.15s" font-size="11" fill="#7d8590">
      of requests. Now building <tspan fill="#58a6ff">open-source developer tools</tspan>.
    </text>

    <!-- Cursor prompt -->
    <text x="24" y="312" class="t f" style="animation-delay:1.3s" font-size="13" fill="#00e5a0" filter="url(#glow)">$</text>
    <rect x="38" y="300" width="2" height="15" rx="1" fill="#00e5a0" opacity="0.85" style="animation: pulse 1.4s cubic-bezier(0.4,0,0.6,1) 1.4s infinite;"/>
  </g>
</svg>
