<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0d12" />
      <stop offset="100%" stop-color="#05070a" />
    </linearGradient>

    <radialGradient id="screenGlare" cx="50%" cy="10%" r="80%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="termBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.5" />
      <stop offset="50%" stop-color="#21262d" stop-opacity="1" />
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.5" />
    </linearGradient>

    <filter id="neonGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="neonBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#ffffff" opacity="0.02" />
    </pattern>

    <clipPath id="type1">
      <rect x="30" y="80" height="40" width="0">
        <animate attributeName="width" from="0" to="800" dur="0.4s" begin="0.5s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="type2">
      <rect x="30" y="130" height="30" width="0">
        <animate attributeName="width" from="0" to="800" dur="0.3s" begin="1.2s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="type3">
      <rect x="30" y="160" height="30" width="0">
        <animate attributeName="width" from="0" to="800" dur="0.4s" begin="1.6s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="type4">
      <rect x="30" y="190" height="30" width="0">
        <animate attributeName="width" from="0" to="800" dur="0.6s" begin="2.1s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="type5">
      <rect x="30" y="220" height="30" width="0">
        <animate attributeName="width" from="0" to="800" dur="0.4s" begin="2.8s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="type6">
      <rect x="30" y="250" height="30" width="0">
        <animate attributeName="width" from="0" to="800" dur="0.5s" begin="3.3s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="type7">
      <rect x="30" y="280" height="30" width="0">
        <animate attributeName="width" from="0" to="800" dur="0.6s" begin="3.9s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="type8">
      <rect x="30" y="310" height="30" width="0">
        <animate attributeName="width" from="0" to="800" dur="0.2s" begin="4.6s" fill="freeze" />
      </rect>
    </clipPath>

    <clipPath id="typeBio1">
      <rect x="30" y="380" height="30" width="0">
        <animate attributeName="width" from="0" to="800" dur="0.6s" begin="5.2s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="typeBio2">
      <rect x="30" y="410" height="30" width="0">
        <animate attributeName="width" from="0" to="800" dur="0.6s" begin="5.8s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="typeBio3">
      <rect x="30" y="440" height="30" width="0">
        <animate attributeName="width" from="0" to="800" dur="0.6s" begin="6.4s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="typeBio4">
      <rect x="30" y="470" height="30" width="0">
        <animate attributeName="width" from="0" to="800" dur="0.6s" begin="7.0s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

  <style>
    .font-mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace; }
    .traffic { animation: pulseBounce 2s ease-in-out infinite; }
    @keyframes pulseBounce { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform:
    scale(1.1); opacity: 1; } }
  </style>

  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <g transform="translate(60, 60)">
    <rect width="1080" height="580" rx="12" fill="#000000" opacity="0.4"
      transform="translate(10, 15)" filter="blur(15px)" />
    <rect width="1080" height="580" rx="12" fill="#0d1117" stroke="url(#termBorder)"
      stroke-width="2" />

    <rect width="1080" height="580" rx="12" fill="url(#screenGlare)" />
    <rect width="1080" height="580" rx="12" fill="url(#scanlines)" />

    <path d="M 0 12 Q 0 0 12 0 L 1068 0 Q 1080 0 1080 12 L 1080 40 L 0 40 Z" fill="#161b22" />
    <line x1="0" y1="40" x2="1080" y2="40" stroke="#30363d" stroke-width="1" />

    <g transform="translate(20, 20)">
      <circle cx="0" cy="0" r="6" fill="#ff5f57" class="traffic" />
      <circle cx="24" cy="0" r="6" fill="#febc2e" class="traffic" style="animation-delay:0.2s" />
      <circle cx="48" cy="0" r="6" fill="#28c840" class="traffic" style="animation-delay:0.4s" />
    </g>

    <text x="540" y="25" text-anchor="middle" class="font-mono" font-size="13" fill="#8b949e"
      font-weight="600">
      prakhar@dev ~/about
    </text>

    <g transform="translate(950, 25)" class="font-mono" font-size="11" fill="#00e5a0">
      <circle cx="0" cy="-4" r="3" fill="#00e5a0" filter="url(#neonGreen)">
        <animate attributeName="opacity" values="0.2; 1; 0.2" dur="1.5s" repeatCount="indefinite" />
      </circle>
      <text x="12" y="0">ONLINE 12ms</text>
    </g>

    <g font-size="17" class="font-mono">
      <g clip-path="url(#type1)">
        <text x="40" y="100">
          <tspan fill="#00e5a0" filter="url(#neonGreen)">$</tspan>
          <tspan fill="#e6edf3"> whoami</tspan>
        </text>
      </g>

      <g clip-path="url(#type2)">
        <text x="40" y="150">
          <tspan fill="#58a6ff" font-weight="bold">const</tspan>
          <tspan fill="#e6edf3"> prakhar = {</tspan>
        </text>
      </g>

      <g clip-path="url(#type3)">
        <text x="40" y="180">
          <tspan fill="#6e7681"> location: </tspan>
          <tspan fill="#00e5a0">"Bengaluru, India"</tspan>
          <tspan fill="#6e7681">,</tspan>
        </text>
      </g>

      <g clip-path="url(#type4)">
        <text x="40" y="210">
          <tspan fill="#6e7681"> experience: </tspan>
          <tspan fill="#00e5a0">"3+ years — Amazon Payments &amp; Travel"</tspan>
          <tspan fill="#6e7681">,</tspan>
        </text>
      </g>

      <g clip-path="url(#type5)">
        <text x="40" y="240">
          <tspan fill="#6e7681"> seeking: </tspan>
          <tspan fill="#00e5a0">"SDE II / Senior SDE"</tspan>
          <tspan fill="#6e7681">,</tspan>
        </text>
      </g>

      <g clip-path="url(#type6)">
        <text x="40" y="270">
          <tspan fill="#6e7681"> education: </tspan>
          <tspan fill="#00e5a0">"MCA, MNNIT Prayagraj (9.25 GPA)"</tspan>
          <tspan fill="#6e7681">,</tspan>
        </text>
      </g>

      <g clip-path="url(#type7)">
        <text x="40" y="300">
          <tspan fill="#6e7681"> passions: [</tspan>
          <tspan fill="#00e5a0">"System Design"</tspan>
          <tspan fill="#6e7681">, </tspan>
          <tspan fill="#00e5a0">"Perf Eng"</tspan>
          <tspan fill="#6e7681">, </tspan>
          <tspan fill="#00e5a0">"Open Source"</tspan>
          <tspan fill="#6e7681">],</tspan>
        </text>
      </g>

      <g clip-path="url(#type8)">
        <text x="40" y="330" fill="#e6edf3">};</text>
      </g>
    </g>

    <line x1="40" y1="360" x2="680" y2="360" stroke="#30363d" stroke-width="2"
      stroke-dasharray="640" stroke-dashoffset="640">
      <animate attributeName="stroke-dashoffset" from="640" to="0" dur="0.8s" begin="4.8s"
        fill="freeze" />
    </line>
    <line x1="40" y1="360" x2="680" y2="360" stroke="#00e5a0" stroke-width="2"
      stroke-dasharray="640" stroke-dashoffset="640" opacity="0">
      <animate attributeName="stroke-dashoffset" from="640" to="0" dur="0.8s" begin="4.8s"
        fill="freeze" />
      <animate attributeName="opacity" values="0; 0.6; 0" dur="3s" begin="5.6s"
        repeatCount="indefinite" />
    </line>

    <g font-size="14.5" class="font-mono" fill="#7d8590">
      <g clip-path="url(#typeBio1)">
        <text x="40" y="400">
          Results-driven engineer who shipped at Amazon scale — hotel booking
        </text>
      </g>
      <g clip-path="url(#typeBio2)">
        <text x="40" y="430">
          platforms, payment orchestration, event-driven architectures. Cut p90
        </text>
      </g>
      <g clip-path="url(#typeBio3)">
        <text x="40" y="460"> latency <tspan fill="#00e5a0" filter="url(#neonGreen)">47%</tspan>,
          boosted conversions <tspan fill="#00e5a0" filter="url(#neonGreen)">33%</tspan>, built
          systems handling millions </text>
      </g>
      <g clip-path="url(#typeBio4)">
        <text x="40" y="490"> of requests. Now building <tspan fill="#58a6ff"
            filter="url(#neonBlue)">open-source developer tools</tspan>. </text>
      </g>
    </g>

    <g transform="translate(40, 530)">
      <text x="0" y="0" font-size="18" class="font-mono" fill="#00e5a0" filter="url(#neonGreen)">$</text>
      <rect x="18" y="-14" width="10" height="18" fill="#00e5a0" opacity="0">
        <animate attributeName="opacity" values="0; 1; 0" dur="1s" begin="7.6s"
          repeatCount="indefinite" />
      </rect>
    </g>

    <g transform="translate(750, 80)">
      <line x1="0" y1="0" x2="0" y2="450" stroke="#21262d" stroke-width="2" />

      <g transform="translate(150, 100)">
        <circle cx="0" cy="0" r="70" fill="none" stroke="#30363d" stroke-width="1" />
        <circle cx="0" cy="0" r="40" fill="none" stroke="#30363d" stroke-width="1"
          stroke-dasharray="5 5" />
        <line x1="-80" y1="0" x2="80" y2="0" stroke="#30363d" stroke-width="1" />
        <line x1="0" y1="-80" x2="0" y2="80" stroke="#30363d" stroke-width="1" />

        <g>
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s"
            repeatCount="indefinite" />
          <path d="M 0 0 L 0 -70 A 70 70 0 0 1 70 0 Z" fill="#00e5a0" opacity="0.15" />
          <line x1="0" y1="0" x2="0" y2="-70" stroke="#00e5a0" stroke-width="2"
            filter="url(#neonGreen)" />
        </g>

        <circle cx="30" cy="-30" r="3" fill="#00e5a0" filter="url(#neonGreen)">
          <animate attributeName="opacity" values="0; 1; 0" dur="4s" repeatCount="indefinite"
            begin="0.5s" />
        </circle>
        <circle cx="-40" cy="20" r="3" fill="#58a6ff" filter="url(#neonBlue)">
          <animate attributeName="opacity" values="0; 1; 0" dur="4s" repeatCount="indefinite"
            begin="2.5s" />
        </circle>
      </g>

      <g transform="translate(150, 280)">
        <path d="M -60 -20 L 0 -50 L 60 -20 L 0 30 Z" fill="none" stroke="#30363d" stroke-width="2" />
        <path d="M -60 -20 L 0 30 L 60 -20" fill="none" stroke="#58a6ff" stroke-width="2"
          stroke-dasharray="100" stroke-dashoffset="100" opacity="0.8">
          <animate attributeName="stroke-dashoffset" values="100; -100" dur="3s"
            repeatCount="indefinite" />
        </path>

        <circle cx="-60" cy="-20" r="8" fill="#0d1117" stroke="#00e5a0" stroke-width="2" />
        <circle cx="60" cy="-20" r="8" fill="#0d1117" stroke="#00e5a0" stroke-width="2" />
        <circle cx="0" cy="-50" r="10" fill="#0d1117" stroke="#58a6ff" stroke-width="2" />

        <circle cx="0" cy="30" r="12" fill="#00e5a0" filter="url(#neonGreen)">
          <animate attributeName="r" values="10; 14; 10" dur="2s" repeatCount="indefinite" />
        </circle>
        <text x="0" y="55" text-anchor="middle" font-size="10" class="font-mono" fill="#8b949e">
          DISTRIBUTED_CORE</text>
      </g>

      <g transform="translate(40, 400)" class="font-mono" font-size="10" fill="#8b949e">
        <text x="0" y="0">SYSTEM_SCALING</text>
        <rect x="0" y="8" width="220" height="6" rx="3" fill="#21262d" />
        <rect x="0" y="8" width="0" height="6" rx="3" fill="#00e5a0" filter="url(#neonGreen)">
          <animate attributeName="width" from="0" to="180" dur="2s" begin="2s" fill="freeze" />
        </rect>

        <text x="0" y="30">OPEN_SOURCE_TOOLS</text>
        <rect x="0" y="38" width="220" height="6" rx="3" fill="#21262d" />
        <rect x="0" y="38" width="0" height="6" rx="3" fill="#58a6ff" filter="url(#neonBlue)">
          <animate attributeName="width" from="0" to="150" dur="2s" begin="2.5s" fill="freeze" />
        </rect>
      </g>
    </g>
  </g>
</svg>
