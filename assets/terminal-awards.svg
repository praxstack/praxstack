<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1200 500"><defs><linearGradient id="bgGrad" x1="0%" x2="0%" y1="0%" y2="100%"><stop offset="0%" stop-color="#0a0d12"/><stop offset="100%" stop-color="#05070a"/></linearGradient><linearGradient id="termBorder" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" stop-color="#00e5a0" stop-opacity=".6"/><stop offset="50%" stop-color="#21262d" stop-opacity="1"/><stop offset="100%" stop-color="#58a6ff" stop-opacity=".6"/></linearGradient><linearGradient id="goldGrad" x1="0%" x2="100%" y1="0%" y2="100%"><stop offset="0%" stop-color="gold"/><stop offset="50%" stop-color="orange"/><stop offset="100%" stop-color="gold"/></linearGradient><linearGradient id="trophyShine" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" stop-color="gold" stop-opacity=".3"><animate attributeName="offset" dur="3s" repeatCount="indefinite" values="-0.3;1.3"/></stop><stop offset="10%" stop-color="#fff" stop-opacity=".8"><animate attributeName="offset" dur="3s" repeatCount="indefinite" values="-0.2;1.4"/></stop><stop offset="20%" stop-color="gold" stop-opacity=".3"><animate attributeName="offset" dur="3s" repeatCount="indefinite" values="-0.1;1.5"/></stop></linearGradient><filter id="neonGreen" width="200%" height="200%" x="-50%" y="-50%"><feGaussianBlur result="blur" stdDeviation="3"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="neonBlue" width="200%" height="200%" x="-50%" y="-50%"><feGaussianBlur result="blur" stdDeviation="3"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="goldGlow" width="200%" height="200%" x="-50%" y="-50%"><feGaussianBlur result="blur" stdDeviation="6"/><feFlood flood-color="gold" flood-opacity=".4"/><feComposite in2="blur" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="softGoldGlow" width="160%" height="160%" x="-30%" y="-30%"><feGaussianBlur result="blur" stdDeviation="4"/><feFlood flood-color="gold" flood-opacity=".25"/><feComposite in2="blur" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter><pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse"><rect width="4" height="1" fill="#fff" opacity=".02"/></pattern><clipPath id="cmdReveal"><rect width="0" height="40" x="0" y="0"><animate fill="freeze" attributeName="width" begin="0.5s" dur="0.6s" from="0" to="900"/></rect></clipPath></defs><style>@keyframes flicker{0%{opacity:1}50%{opacity:.8}}@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-4px)}}.mono{font-family:&apos;SF Mono&apos;,&apos;Fira Code&apos;,&apos;Cascadia Code&apos;,&apos;Consolas&apos;,monospace}.sans{font-family:system-ui,-apple-system,&apos;Segoe UI&apos;,sans-serif}.traffic{animation:flicker 2s infinite}</style><rect width="100%" height="100%" fill="url(#bgGrad)"/><rect width="100%" height="100%" fill="url(#scanlines)" pointer-events="none"/><g transform="translate(50, 30)"><rect width="1100" height="440" fill="#0d1117" stroke="url(#termBorder)" stroke-width="2" rx="16"/><rect width="1100" height="45" fill="#161b22" rx="16"/><rect width="1100" height="20" y="25" fill="#161b22"/><line x1="0" x2="1100" y1="45" y2="45" stroke="#30363d"/><g transform="translate(25, 22)"><circle cx="0" cy="0" r="7" fill="#ff5f57" class="traffic"/><circle cx="25" cy="0" r="7" fill="#febc2e" class="traffic" style="animation-delay:.3s"/><circle cx="50" cy="0" r="7" fill="#28c840" class="traffic" style="animation-delay:.6s"/></g><text x="550" y="28" fill="#8b949e" class="mono" font-size="14" font-weight="600" text-anchor="middle">prakhar@sys: ~/achievements --highlight</text><g><g clip-path="url(#cmdReveal)" transform="translate(40, 80)"><text y="20" fill="#00e5a0" class="mono" filter="url(#neonGreen)" font-size="18">$ <tspan fill="#e6edf3">cat achievements.log | grep &quot;CHAMPION&quot;</tspan></text></g><text y="55" fill="#8b949e" class="mono" font-size="13" opacity="0" transform="translate(40, 80)">&gt; Scanning recognition database... 1 result found. <animate fill="freeze" attributeName="opacity" begin="1.2s" dur="0.3s" from="0" to="1"/></text></g><g opacity="0" transform="translate(40, 160)"><animate fill="freeze" attributeName="opacity" begin="1.8s" dur="0.6s" from="0" to="1"/><animateTransform fill="freeze" attributeName="transform" begin="1.8s" dur="0.6s" from="40,180" to="40,160" type="translate"/><rect width="1020" height="260" fill="#161b22" stroke="#21262d" stroke-width="1.5" rx="12"/><rect width="1020" height="3" fill="url(#goldGrad)" filter="url(#softGoldGlow)" rx="1.5"><animate attributeName="opacity" dur="3s" repeatCount="indefinite" values="0.6;1;0.6"/></rect><g transform="translate(120, 130)"><circle cx="0" cy="0" r="80" fill="none" stroke="gold" stroke-dasharray="8 12" stroke-width="1" opacity=".3"><animateTransform attributeName="transform" dur="20s" from="0" repeatCount="indefinite" to="360" type="rotate"/></circle><circle cx="0" cy="0" r="65" fill="none" stroke="orange" stroke-dasharray="4 8" stroke-width="1" opacity=".2"><animateTransform attributeName="transform" dur="15s" from="360" repeatCount="indefinite" to="0" type="rotate"/></circle><g filter="url(#goldGlow)" style="animation:float 3s ease-in-out infinite"><path fill="url(#goldGrad)" stroke="orange" stroke-width="1.5" d="M -25 -40 L -25 -10 Q -25 20 0 30 Q 25 20 25 -10 L 25 -40 Z"/><rect width="60" height="8" x="-30" y="-45" fill="url(#goldGrad)" stroke="orange" stroke-width="1" rx="3"/><path fill="none" stroke="gold" stroke-linecap="round" stroke-width="3" d="M -25 -30 Q -45 -30 -45 -10 Q -45 10 -25 10"/><path fill="none" stroke="gold" stroke-linecap="round" stroke-width="3" d="M 25 -30 Q 45 -30 45 -10 Q 45 10 25 10"/><rect width="10" height="15" x="-5" y="30" fill="url(#goldGrad)"/><rect width="40" height="8" x="-20" y="45" fill="url(#goldGrad)" stroke="orange" stroke-width="1" rx="3"/><path fill="#fff" d="M 0 -30 L 4 -20 L 14 -20 L 6 -13 L 9 -3 L 0 -9 L -9 -3 L -6 -13 L -14 -20 L -4 -20 Z" opacity=".9"/><path fill="url(#trophyShine)" d="M -25 -40 L -25 -10 Q -25 20 0 30 Q 25 20 25 -10 L 25 -40 Z"/></g><circle cx="-50" cy="-50" r="2" fill="gold" opacity="0"><animate attributeName="opacity" begin="0s" dur="2s" repeatCount="indefinite" values="0;1;0"/><animateTransform attributeName="transform" dur="2s" repeatCount="indefinite" type="translate" values="0,0;-10,-15"/></circle><circle cx="55" cy="-45" r="1.5" fill="orange" opacity="0"><animate attributeName="opacity" begin="0.8s" dur="2.5s" repeatCount="indefinite" values="0;1;0"/><animateTransform attributeName="transform" begin="0.8s" dur="2.5s" repeatCount="indefinite" type="translate" values="0,0;12,-10"/></circle><circle cx="40" cy="50" r="1.5" fill="gold" opacity="0"><animate attributeName="opacity" begin="1.5s" dur="3s" repeatCount="indefinite" values="0;0.8;0"/><animateTransform attributeName="transform" begin="1.5s" dur="3s" repeatCount="indefinite" type="translate" values="0,0;8,12"/></circle><circle cx="-45" cy="40" r="1" fill="#fff" opacity="0"><animate attributeName="opacity" begin="0.5s" dur="1.8s" repeatCount="indefinite" values="0;0.6;0"/><animateTransform attributeName="transform" begin="0.5s" dur="1.8s" repeatCount="indefinite" type="translate" values="0,0;-6,8"/></circle></g><g transform="translate(280, 40)"><text fill="gold" class="mono" filter="url(#softGoldGlow)" font-size="12" font-weight="bold" letter-spacing="3">RECOGNITION // 2023</text><text y="45" fill="#fff" class="sans" font-size="28" font-weight="900" letter-spacing="1">Amazon Pay — Merchants Categories Champion</text><line x1="0" x2="600" y1="65" y2="65" stroke="gold" stroke-width="1" opacity=".3"><animate attributeName="opacity" dur="3s" repeatCount="indefinite" values="0.2;0.5;0.2"/></line><text y="95" fill="#e6edf3" class="mono" font-size="14">Recognized for resolving <tspan fill="#00e5a0" filter="url(#neonGreen)" font-weight="bold">100+ hotel trust-buster bugs</tspan></text><text y="120" fill="#e6edf3" class="mono" font-size="14">and cutting on-call ticket volume from <tspan fill="gold" font-weight="bold">20+ to ~5 per shift</tspan></text><text y="145" fill="#8b949e" class="mono" font-size="14">→ saving ~2 weeks of engineering effort weekly</text><g transform="translate(0, 175)"><rect width="140" height="50" fill="#0d1117" stroke="#21262d" rx="6"/><text x="15" y="20" fill="#8b949e" class="mono" font-size="10">BUGS_RESOLVED</text><text x="15" y="40" fill="#00e5a0" class="mono" filter="url(#neonGreen)" font-size="18" font-weight="bold">100+</text><rect width="140" height="50" x="155" fill="#0d1117" stroke="#21262d" rx="6"/><text x="170" y="20" fill="#8b949e" class="mono" font-size="10">TICKET_REDUCTION</text><text x="170" y="40" fill="#58a6ff" class="mono" filter="url(#neonBlue)" font-size="18" font-weight="bold">75% ↓</text><rect width="140" height="50" x="310" fill="#0d1117" stroke="#21262d" rx="6"/><text x="325" y="20" fill="#8b949e" class="mono" font-size="10">TIME_SAVED</text><text x="325" y="40" fill="gold" class="mono" filter="url(#softGoldGlow)" font-size="18" font-weight="bold">~2 wks</text><rect width="140" height="50" x="465" fill="#0d1117" stroke="#21262d" rx="6"/><text x="480" y="20" fill="#8b949e" class="mono" font-size="10">SCOPE</text><text x="480" y="40" fill="#e6edf3" class="mono" font-size="18" font-weight="bold">Amazon Pay</text></g></g></g></g></svg>