<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0d12" />
      <stop offset="100%" stop-color="#05070a" />
    </linearGradient>

    <linearGradient id="termBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#21262d" stop-opacity="1" />
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.6" />
    </linearGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#FFA500" />
      <stop offset="100%" stop-color="#FFD700" />
    </linearGradient>

    <linearGradient id="trophyShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.3">
        <animate attributeName="offset" values="-0.3;1.3" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="10%" stop-color="#ffffff" stop-opacity="0.8">
        <animate attributeName="offset" values="-0.2;1.4" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="20%" stop-color="#FFD700" stop-opacity="0.3">
        <animate attributeName="offset" values="-0.1;1.5" dur="3s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <filter id="neonGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="neonBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feFlood flood-color="#FFD700" flood-opacity="0.4" />
      <feComposite in2="blur" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="softGoldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feFlood flood-color="#FFD700" flood-opacity="0.25" />
      <feComposite in2="blur" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#ffffff" opacity="0.02" />
    </pattern>

    <clipPath id="cmdReveal">
      <rect x="0" y="0" height="40" width="0">
        <animate attributeName="width" from="0" to="900" dur="0.6s" begin="0.5s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

  <style>
    .mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace; }
    .sans { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
    .traffic { animation: flicker 2s infinite; }
    @keyframes flicker { 0%,100% { opacity: 1; } 50% { opacity: 0.8; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>

  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  <rect width="100%" height="100%" fill="url(#scanlines)" pointer-events="none" />

  <g transform="translate(50, 30)">
    <rect width="1100" height="440" rx="16" fill="#0d1117" stroke="url(#termBorder)"
      stroke-width="2" />

    <!-- Title bar -->
    <rect width="1100" height="45" rx="16" fill="#161b22" />
    <rect y="25" width="1100" height="20" fill="#161b22" />
    <line x1="0" y1="45" x2="1100" y2="45" stroke="#30363d" />

    <g transform="translate(25, 22)">
      <circle cx="0" cy="0" r="7" fill="#ff5f57" class="traffic" />
      <circle cx="25" cy="0" r="7" fill="#febc2e" class="traffic" style="animation-delay:0.3s" />
      <circle cx="50" cy="0" r="7" fill="#28c840" class="traffic" style="animation-delay:0.6s" />
    </g>

    <text x="550" y="28" text-anchor="middle" class="mono" font-size="14" fill="#8b949e"
      font-weight="600">
      prakhar@sys: ~/achievements --highlight
    </text>

    <!-- Command -->
    <g transform="translate(40, 80)">
      <g clip-path="url(#cmdReveal)">
        <text y="20" class="mono" font-size="18" fill="#00e5a0" filter="url(#neonGreen)"> $ <tspan
            fill="#e6edf3">cat achievements.log | grep "CHAMPION"</tspan>
        </text>
      </g>

      <!-- Processing line -->
      <text y="55" class="mono" font-size="13" fill="#8b949e" opacity="0"> > Scanning recognition
        database... 1 result found. <animate attributeName="opacity" from="0" to="1" dur="0.3s"
          begin="1.2s" fill="freeze" />
      </text>
    </g>

    <!-- Main award card -->
    <g transform="translate(40, 160)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.8s" fill="freeze" />
      <animateTransform attributeName="transform" type="translate" from="40,180" to="40,160"
        dur="0.6s" begin="1.8s" fill="freeze" />

      <rect width="1020" height="260" rx="12" fill="#161b22" stroke="#21262d" stroke-width="1.5" />

      <!-- Gold accent bar at top -->
      <rect width="1020" height="3" rx="1.5" fill="url(#goldGrad)" filter="url(#softGoldGlow)">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" />
      </rect>

      <!-- Trophy section (left) -->
      <g transform="translate(120, 130)">
        <!-- Outer glow ring -->
        <circle cx="0" cy="0" r="80" fill="none" stroke="#FFD700" stroke-width="1"
          stroke-dasharray="8 12" opacity="0.3">
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s"
            repeatCount="indefinite" />
        </circle>
        <circle cx="0" cy="0" r="65" fill="none" stroke="#FFA500" stroke-width="1"
          stroke-dasharray="4 8" opacity="0.2">
          <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s"
            repeatCount="indefinite" />
        </circle>

        <!-- Trophy SVG -->
        <g filter="url(#goldGlow)" style="animation: float 3s ease-in-out infinite;">
          <!-- Cup body -->
          <path d="M -25 -40 L -25 -10 Q -25 20 0 30 Q 25 20 25 -10 L 25 -40 Z"
            fill="url(#goldGrad)" stroke="#FFA500" stroke-width="1.5" />
          <!-- Cup rim -->
          <rect x="-30" y="-45" width="60" height="8" rx="3" fill="url(#goldGrad)" stroke="#FFA500"
            stroke-width="1" />
          <!-- Left handle -->
          <path d="M -25 -30 Q -45 -30 -45 -10 Q -45 10 -25 10" fill="none" stroke="#FFD700"
            stroke-width="3" stroke-linecap="round" />
          <!-- Right handle -->
          <path d="M 25 -30 Q 45 -30 45 -10 Q 45 10 25 10" fill="none" stroke="#FFD700"
            stroke-width="3" stroke-linecap="round" />
          <!-- Stem -->
          <rect x="-5" y="30" width="10" height="15" fill="url(#goldGrad)" />
          <!-- Base -->
          <rect x="-20" y="45" width="40" height="8" rx="3" fill="url(#goldGrad)" stroke="#FFA500"
            stroke-width="1" />
          <!-- Star on cup -->
          <path
            d="M 0 -30 L 4 -20 L 14 -20 L 6 -13 L 9 -3 L 0 -9 L -9 -3 L -6 -13 L -14 -20 L -4 -20 Z"
            fill="#ffffff" opacity="0.9" />
          <!-- Shine overlay -->
          <path d="M -25 -40 L -25 -10 Q -25 20 0 30 Q 25 20 25 -10 L 25 -40 Z"
            fill="url(#trophyShine)" />
        </g>

        <!-- Sparkle particles -->
        <circle cx="-50" cy="-50" r="2" fill="#FFD700" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"
            begin="0s" />
          <animateTransform attributeName="transform" type="translate" values="0,0;-10,-15" dur="2s"
            repeatCount="indefinite" />
        </circle>
        <circle cx="55" cy="-45" r="1.5" fill="#FFA500" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"
            begin="0.8s" />
          <animateTransform attributeName="transform" type="translate" values="0,0;12,-10"
            dur="2.5s" repeatCount="indefinite" begin="0.8s" />
        </circle>
        <circle cx="40" cy="50" r="1.5" fill="#FFD700" opacity="0">
          <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite"
            begin="1.5s" />
          <animateTransform attributeName="transform" type="translate" values="0,0;8,12" dur="3s"
            repeatCount="indefinite" begin="1.5s" />
        </circle>
        <circle cx="-45" cy="40" r="1" fill="#ffffff" opacity="0">
          <animate attributeName="opacity" values="0;0.6;0" dur="1.8s" repeatCount="indefinite"
            begin="0.5s" />
          <animateTransform attributeName="transform" type="translate" values="0,0;-6,8" dur="1.8s"
            repeatCount="indefinite" begin="0.5s" />
        </circle>
      </g>

      <!-- Award text section (right) -->
      <g transform="translate(280, 40)">
        <!-- Award title -->
        <text class="mono" font-size="12" fill="#FFD700" font-weight="bold" letter-spacing="3"
          filter="url(#softGoldGlow)">
          RECOGNITION // 2023
        </text>

        <!-- Award name -->
        <text y="45" class="sans" font-size="28" fill="#ffffff" font-weight="900" letter-spacing="1">
          Amazon Pay — Merchants Categories Champion
        </text>

        <!-- Divider -->
        <line x1="0" y1="65" x2="600" y2="65" stroke="#FFD700" stroke-width="1" opacity="0.3">
          <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite" />
        </line>

        <!-- Description -->
        <text y="95" class="mono" font-size="14" fill="#e6edf3"> Recognized for resolving <tspan
            fill="#00e5a0" filter="url(#neonGreen)" font-weight="bold">100+ hotel trust-buster bugs</tspan>
        </text>
        <text y="120" class="mono" font-size="14" fill="#e6edf3"> and cutting on-call ticket volume
          from <tspan fill="#FFD700" font-weight="bold">20+ to ~5 per shift</tspan>
        </text>
        <text y="145" class="mono" font-size="14" fill="#8b949e">
          → saving ~2 weeks of engineering effort weekly
        </text>

        <!-- Impact metrics row -->
        <g transform="translate(0, 175)">
          <rect width="140" height="50" rx="6" fill="#0d1117" stroke="#21262d" />
          <text x="15" y="20" class="mono" font-size="10" fill="#8b949e">BUGS_RESOLVED</text>
          <text x="15" y="40" class="mono" font-size="18" fill="#00e5a0" font-weight="bold"
            filter="url(#neonGreen)">100+</text>

          <rect x="155" width="140" height="50" rx="6" fill="#0d1117" stroke="#21262d" />
          <text x="170" y="20" class="mono" font-size="10" fill="#8b949e">TICKET_REDUCTION</text>
          <text x="170" y="40" class="mono" font-size="18" fill="#58a6ff" font-weight="bold"
            filter="url(#neonBlue)">75% ↓</text>

          <rect x="310" width="140" height="50" rx="6" fill="#0d1117" stroke="#21262d" />
          <text x="325" y="20" class="mono" font-size="10" fill="#8b949e">TIME_SAVED</text>
          <text x="325" y="40" class="mono" font-size="18" fill="#FFD700" font-weight="bold"
            filter="url(#softGoldGlow)">~2 wks</text>

          <rect x="465" width="140" height="50" rx="6" fill="#0d1117" stroke="#21262d" />
          <text x="480" y="20" class="mono" font-size="10" fill="#8b949e">SCOPE</text>
          <text x="480" y="40" class="mono" font-size="18" fill="#e6edf3" font-weight="bold">Amazon
            Pay</text>
        </g>
      </g>
    </g>
  </g>
</svg>
