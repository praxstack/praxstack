<svg xmlns="http://www.w3.org/2000/svg" width="800" height="240" viewBox="0 0 800 240">
  <defs>
    <radialGradient id="crt" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.015"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#ffffff" opacity="0.007"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feFlood flood-color="#00e5a0" flood-opacity="0.3"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="wc"><rect width="800" height="240" rx="8"/></clipPath>
  </defs>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) { .f { opacity: 1 !important; animation: none !important; } }
    .t { font-family: 'SF Mono','Fira Code','Cascadia Code','Consolas',monospace; }
    .f { opacity: 0; animation: fadeIn 0.35s ease-out forwards; }
  </style>

  <g clip-path="url(#wc)">
    <rect width="800" height="240" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
    <rect x="1" y="1" width="798" height="34" rx="7" fill="#161b22"/>
    <rect x="1" y="20" width="798" height="16" fill="#161b22"/>
    <line x1="0" y1="35" x2="800" y2="35" stroke="#21262d" stroke-width="0.5"/>
    <circle cx="20" cy="18" r="5" fill="#ff5f57" opacity="0.8"/>
    <circle cx="36" cy="18" r="5" fill="#febc2e" opacity="0.8"/>
    <circle cx="52" cy="18" r="5" fill="#28c840" opacity="0.8"/>
    <text x="400" y="22" text-anchor="middle" class="t" font-size="11" fill="#6e7681">tech-stack</text>
    <rect x="1" y="36" width="798" height="203" fill="url(#crt)"/>
    <rect x="1" y="36" width="798" height="203" fill="url(#scan)"/>

    <!-- Command -->
    <text x="24" y="62" class="t f" style="animation-delay:0.1s" font-size="13">
      <tspan fill="#00e5a0" filter="url(#glow)">$</tspan><tspan fill="#e6edf3"> ls tech-stack/</tspan>
    </text>

    <!-- LANGUAGES -->
    <text x="24" y="92" class="t f" style="animation-delay:0.25s" font-size="11">
      <tspan fill="#00e5a0" font-weight="600">LANGUAGES</tspan>
      <tspan fill="#30363d">    </tspan>
      <tspan fill="#e6edf3">Java</tspan><tspan fill="#30363d">  ·  </tspan>
      <tspan fill="#e6edf3">TypeScript</tspan><tspan fill="#30363d">  ·  </tspan>
      <tspan fill="#e6edf3">JavaScript</tspan><tspan fill="#30363d">  ·  </tspan>
      <tspan fill="#e6edf3">Python</tspan><tspan fill="#30363d">  ·  </tspan>
      <tspan fill="#e6edf3">C++</tspan>
    </text>

    <!-- FRONTEND -->
    <text x="24" y="116" class="t f" style="animation-delay:0.35s" font-size="11">
      <tspan fill="#58a6ff" font-weight="600">FRONTEND </tspan>
      <tspan fill="#30363d">    </tspan>
      <tspan fill="#e6edf3">React</tspan><tspan fill="#30363d">  ·  </tspan>
      <tspan fill="#e6edf3">Redux</tspan><tspan fill="#30363d">  ·  </tspan>
      <tspan fill="#e6edf3">Tailwind</tspan><tspan fill="#30363d">  ·  </tspan>
      <tspan fill="#e6edf3">Vite</tspan>
    </text>

    <!-- BACKEND -->
    <text x="24" y="140" class="t f" style="animation-delay:0.45s" font-size="11">
      <tspan fill="#00e5a0" font-weight="600">BACKEND  </tspan>
      <tspan fill="#30363d">    </tspan>
      <tspan fill="#e6edf3">Node.js</tspan><tspan fill="#30363d">  ·  </tspan>
      <tspan fill="#e6edf3">Express</tspan><tspan fill="#30363d">  ·  </tspan>
      <tspan fill="#e6edf3">Spring Boot</tspan><tspan fill="#30363d">  ·  </tspan>
      <tspan fill="#e6edf3">GraphQL</tspan>
    </text>

    <!-- AWS -->
    <text x="24" y="164" class="t f" style="animation-delay:0.55s" font-size="11">
      <tspan fill="#58a6ff" font-weight="600">AWS      </tspan>
      <tspan fill="#30363d">    </tspan>
      <tspan fill="#e6edf3">Lambda</tspan><tspan fill="#30363d">  ·  </tspan>
      <tspan fill="#e6edf3">DynamoDB</tspan><tspan fill="#30363d">  ·  </tspan>
      <tspan fill="#e6edf3">Step Fn</tspan><tspan fill="#30363d">  ·  </tspan>
      <tspan fill="#e6edf3">ECS</tspan><tspan fill="#30363d">  ·  </tspan>
      <tspan fill="#e6edf3">CDK</tspan><tspan fill="#30363d">  ·  </tspan>
      <tspan fill="#e6edf3">API GW</tspan>
    </text>

    <!-- TOOLS -->
    <text x="24" y="188" class="t f" style="animation-delay:0.65s" font-size="11">
      <tspan fill="#00e5a0" font-weight="600">TOOLS    </tspan>
      <tspan fill="#30363d">    </tspan>
      <tspan fill="#e6edf3">Git</tspan><tspan fill="#30363d">  ·  </tspan>
      <tspan fill="#e6edf3">Docker</tspan><tspan fill="#30363d">  ·  </tspan>
      <tspan fill="#e6edf3">Jest</tspan><tspan fill="#30363d">  ·  </tspan>
      <tspan fill="#e6edf3">CI/CD</tspan>
    </text>

    <!-- Bottom -->
    <line x1="24" y1="206" x2="776" y2="206" stroke="#21262d" stroke-width="0.3" class="f" style="animation-delay:0.8s"/>
    <text x="24" y="226" class="t f" style="animation-delay:0.85s" font-size="10" fill="#30363d">5 categories · 24 technologies</text>
  </g>
</svg>
