<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%" role="img" aria-labelledby="stack-title stack-desc">
  <title id="stack-title">Tech stack</title>
  <desc id="stack-desc">Terminal-styled grid of technologies I work with, colored by ecosystem.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0d12" />
      <stop offset="100%" stop-color="#05070a" />
    </linearGradient>

    <linearGradient id="termBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#21262d" stop-opacity="1" />
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.6" />
    </linearGradient>

    <filter id="neonGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="neonBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#ffffff" opacity="0.03" />
    </pattern>

    <clipPath id="lsReveal">
      <rect x="0" y="0" height="40" width="0">
        <animate attributeName="width" from="0" to="800" dur="0.6s" begin="0.5s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  <rect width="100%" height="100%" fill="url(#scanlines)" pointer-events="none" />

  <g transform="translate(50, 30)">
    <rect width="1100" height="740" rx="16" fill="#0d1117" stroke="url(#termBorder)"
      stroke-width="2" />

    <rect width="1100" height="45" rx="16" fill="#161b22" />
    <rect y="25" width="1100" height="20" fill="#161b22" />
    <line x1="0" y1="45" x2="1100" y2="45" stroke="#30363d" />

    <circle cx="25" cy="22" r="7" fill="#ff5f57" />
    <circle cx="50" cy="22" r="7" fill="#febc2e" />
    <circle cx="75" cy="22" r="7" fill="#28c840" />
    <text x="550" y="28" text-anchor="middle" font-family="monospace" font-size="14" fill="#8b949e"
      font-weight="bold">prakhar@sys: ~/tech-stack --full-registry</text>

    <g transform="translate(40, 80)">
      <g clip-path="url(#lsReveal)">
        <text y="20" font-family="monospace" font-size="20" fill="#00e5a0" filter="url(#neonGreen)">
          $ <tspan fill="#e6edf3">ls --icons --recursive stack/</tspan></text>
      </g>

      <g transform="translate(0, 50)">
        <g opacity="0">
          <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1s" fill="freeze" />
          <animateTransform attributeName="transform" type="translate" from="-20,0" to="0,0"
            dur="0.4s" begin="1s" fill="freeze" />

          <rect width="680" height="90" rx="8" fill="#161b22" stroke="#21262d" />
          <line x1="0" y1="0" x2="0" y2="90" stroke="#00e5a0" stroke-width="4" />
          <text x="80" y="35" font-family="monospace" font-size="14" fill="#00e5a0"
            font-weight="900" filter="url(#neonGreen)">[ LANGUAGES ]</text>
          <text x="80" y="65" font-family="monospace" font-size="17" fill="#e6edf3">Java ·
            TypeScript · JavaScript · Python · C++ · SQL</text>
          <circle cx="40" cy="45" r="15" fill="none" stroke="#00e5a0" stroke-width="1"
            stroke-dasharray="2 4" />
        </g>
      </g>

      <g transform="translate(0, 160)">
        <g opacity="0">
          <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.2s" fill="freeze" />
          <animateTransform attributeName="transform" type="translate" from="-20,0" to="0,0"
            dur="0.4s" begin="1.2s" fill="freeze" />

          <rect width="680" height="90" rx="8" fill="#161b22" stroke="#21262d" />
          <line x1="0" y1="0" x2="0" y2="90" stroke="#58a6ff" stroke-width="4" />
          <text x="80" y="35" font-family="monospace" font-size="14" fill="#58a6ff"
            font-weight="900" filter="url(#neonBlue)">[ FRONTEND ]</text>
          <text x="80" y="65" font-family="monospace" font-size="17" fill="#e6edf3">React · Redux ·
            Tailwind · Vite · HTML5 · CSS3 · Next.js</text>
          <g transform="translate(40, 45)" fill="none" stroke="#58a6ff" stroke-width="1">
            <ellipse rx="15" ry="6" />
            <ellipse rx="15" ry="6" transform="rotate(60)" />
            <ellipse rx="15" ry="6" transform="rotate(120)" />
          </g>
        </g>
      </g>

      <g transform="translate(0, 270)">
        <g opacity="0">
          <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.4s" fill="freeze" />
          <animateTransform attributeName="transform" type="translate" from="-20,0" to="0,0"
            dur="0.4s" begin="1.4s" fill="freeze" />

          <rect width="680" height="90" rx="8" fill="#161b22" stroke="#21262d" />
          <line x1="0" y1="0" x2="0" y2="90" stroke="#00e5a0" stroke-width="4" />
          <text x="80" y="35" font-family="monospace" font-size="14" fill="#00e5a0"
            font-weight="900" filter="url(#neonGreen)">[ BACKEND ]</text>
          <text x="80" y="65" font-family="monospace" font-size="17" fill="#e6edf3">Node.js ·
            Express · Spring Boot · GraphQL · REST</text>
          <path d="M 30 35 L 50 35 L 50 55 L 30 55 Z" fill="none" stroke="#00e5a0"
            transform="translate(0,0)" />
        </g>
      </g>

      <g transform="translate(0, 380)">
        <g opacity="0">
          <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.6s" fill="freeze" />
          <animateTransform attributeName="transform" type="translate" from="-20,0" to="0,0"
            dur="0.4s" begin="1.6s" fill="freeze" />

          <rect width="680" height="90" rx="8" fill="#161b22" stroke="#21262d" />
          <line x1="0" y1="0" x2="0" y2="90" stroke="#58a6ff" stroke-width="4" />
          <text x="80" y="35" font-family="monospace" font-size="14" fill="#58a6ff"
            font-weight="900" filter="url(#neonBlue)">[ AWS CLOUD ]</text>
          <text x="80" y="65" font-family="monospace" font-size="16" fill="#e6edf3">Lambda ·
            DynamoDB · Step Fn · ECS · CDK · API GW · AppSync · CloudWatch</text>
          <path d="M 30 50 Q 30 40 40 40 Q 45 30 55 35 Q 60 45 50 55 L 35 55 Z" fill="none"
            stroke="#58a6ff" />
        </g>
      </g>

      <g transform="translate(0, 490)">
        <g opacity="0">
          <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.8s" fill="freeze" />
          <animateTransform attributeName="transform" type="translate" from="-20,0" to="0,0"
            dur="0.4s" begin="1.8s" fill="freeze" />

          <rect width="680" height="90" rx="8" fill="#161b22" stroke="#21262d" />
          <line x1="0" y1="0" x2="0" y2="90" stroke="#00e5a0" stroke-width="4" />
          <text x="80" y="35" font-family="monospace" font-size="14" fill="#00e5a0"
            font-weight="900" filter="url(#neonGreen)">[ TOOLS ]</text>
          <text x="80" y="65" font-family="monospace" font-size="17" fill="#e6edf3">Git · Docker ·
            Jest · CI/CD · TDD · Linux CLI</text>
          <circle cx="40" cy="45" r="10" fill="none" stroke="#00e5a0" stroke-width="2"
            stroke-dasharray="4 2" />
        </g>
      </g>

      <g transform="translate(0, 610)">
        <text font-family="monospace" font-size="14" fill="#484f58" font-weight="bold">
          SYSTEM_REGISTRY: 5 CATEGORIES // 30 TECHNOLOGIES // OPTIMIZED FOR SCALE <animate
            attributeName="opacity" values="0;1;0.5;1" dur="2s" begin="2.5s" fill="freeze" />
        </text>
      </g>
    </g>

    <g transform="translate(780, 100)">
      <line x1="0" y1="20" x2="0" y2="520" stroke="#21262d" stroke-width="2" stroke-dasharray="5 5" />

      <g transform="translate(140, 240)">
        <circle r="130" fill="none" stroke="#21262d" stroke-width="1" />
        <circle r="100" fill="none" stroke="#30363d" stroke-width="1" stroke-dasharray="10 10" />

        <g filter="url(#neonGreen)">
          <path d="M 0 -80 L 70 -40 L 70 40 L 0 80 L -70 40 L -70 -40 Z" fill="none"
            stroke="#00e5a0" stroke-width="2">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s"
              repeatCount="indefinite" />
          </path>
        </g>
        <circle r="15" fill="#58a6ff" filter="url(#neonBlue)">
          <animate attributeName="r" values="12; 18; 12" dur="3s" repeatCount="indefinite" />
        </circle>
        <text y="120" text-anchor="middle" font-family="monospace" font-size="12" fill="#8b949e"
          font-weight="bold">CORE_ENGINEERING_STATUS</text>
        <text y="140" text-anchor="middle" font-family="monospace" font-size="11" fill="#00e5a0">
          OPTIMIZED_FOR_AMAZON_SCALE</text>
      </g>

      <g transform="translate(20, 480)" font-family="monospace" font-size="11" fill="#8b949e">
        <text y="0">SCALABILITY_READY</text>
        <rect y="10" width="240" height="8" rx="4" fill="#161b22" />
        <rect y="10" width="0" height="8" rx="4" fill="#00e5a0" filter="url(#neonGreen)">
          <animate attributeName="width" from="0" to="230" dur="2s" begin="2s" fill="freeze" />
        </rect>

        <text y="45">DISTRIBUTED_ARCHITECTURE</text>
        <rect y="55" width="240" height="8" rx="4" fill="#161b22" />
        <rect y="55" width="0" height="8" rx="4" fill="#58a6ff" filter="url(#neonBlue)">
          <animate attributeName="width" from="0" to="210" dur="2s" begin="2.5s" fill="freeze" />
        </rect>
      </g>
    </g>
  </g>
</svg>
