<svg xmlns="http://www.w3.org/2000/svg" width="800" height="240" viewBox="0 0 800 240">
  <defs>
    <radialGradient id="crt" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.015" />
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0" />
    </radialGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#ffffff" opacity="0.007" />
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b" />
      <feFlood flood-color="#00e5a0" flood-opacity="0.3" />
      <feComposite in2="b" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowB">
      <feGaussianBlur stdDeviation="3" result="b" />
      <feFlood flood-color="#58a6ff" flood-opacity="0.3" />
      <feComposite in2="b" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="borderGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.2" />
    </linearGradient>
    <clipPath id="wc">
      <rect width="800" height="240" rx="8" />
    </clipPath>
  </defs>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1;
    transform: translateX(0); } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(15px); } to { opacity: 1;
    transform: translateX(0); } }
    @keyframes labelGlow { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
    @keyframes dotBounce { 0%,100% { r: 5; } 50% { r: 5.5; } }
    @keyframes techReveal { from { opacity: 0; letter-spacing: 2px; } to { opacity: 1;
    letter-spacing: 0; } }
    @media (prefers-reduced-motion: reduce) { .f, .sl, .sr, .tr { opacity: 1 !important; animation:
    none !important; transform: none !important; } }
    .t { font-family: 'SF Mono','Fira Code','Cascadia Code','Consolas',monospace; }
    .f { opacity: 0; animation: fadeIn 0.35s ease-out forwards; }
    .sl { opacity: 0; animation: slideInLeft 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
    .sr { opacity: 0; animation: slideInRight 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
    .traffic { animation: dotBounce 2s ease-in-out infinite; }
    .label-pulse { animation: labelGlow 3s ease-in-out infinite; }
  </style>

  <g clip-path="url(#wc)">
    <rect width="800" height="240" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1" />
    <rect width="800" height="240" rx="8" fill="none" stroke="url(#borderGlow)" stroke-width="0.5"
      opacity="0">
      <animate attributeName="opacity" values="0;0.3;0" dur="5s" repeatCount="indefinite"
        begin="1.5s" />
    </rect>

    <rect x="1" y="1" width="798" height="34" rx="7" fill="#161b22" />
    <rect x="1" y="20" width="798" height="16" fill="#161b22" />
    <line x1="0" y1="35" x2="800" y2="35" stroke="#21262d" stroke-width="0.5" />
    <circle cx="20" cy="18" r="5" fill="#ff5f57" opacity="0.8" class="traffic" />
    <circle cx="36" cy="18" r="5" fill="#febc2e" opacity="0.8" class="traffic"
      style="animation-delay:0.3s" />
    <circle cx="52" cy="18" r="5" fill="#28c840" opacity="0.8" class="traffic"
      style="animation-delay:0.6s" />
    <text x="400" y="22" text-anchor="middle" class="t f" font-size="11" fill="#6e7681">tech-stack</text>
    <rect x="1" y="36" width="798" height="203" fill="url(#crt)" />
    <rect x="1" y="36" width="798" height="203" fill="url(#scan)" />

    <!-- Command — slide in -->
    <text x="24" y="62" class="t sl" style="animation-delay:0.1s" font-size="13">
      <tspan fill="#00e5a0" filter="url(#glow)">$</tspan>
      <tspan fill="#e6edf3"> ls tech-stack/</tspan>
    </text>

    <!-- LANGUAGES — slide from left, alternating direction per row -->
    <text x="24" y="92" class="t sl" style="animation-delay:0.3s" font-size="11">
      <tspan fill="#00e5a0" font-weight="600" filter="url(#glow)" class="label-pulse">LANGUAGES</tspan>
      <tspan fill="#30363d"> </tspan>
      <tspan fill="#e6edf3">Java</tspan>
      <tspan fill="#30363d"> · </tspan>
      <tspan fill="#e6edf3">TypeScript</tspan>
      <tspan fill="#30363d"> · </tspan>
      <tspan fill="#e6edf3">JavaScript</tspan>
      <tspan fill="#30363d"> · </tspan>
      <tspan fill="#e6edf3">Python</tspan>
      <tspan fill="#30363d"> · </tspan>
      <tspan fill="#e6edf3">C++</tspan>
    </text>

    <!-- FRONTEND — slide from right -->
    <text x="24" y="116" class="t sr" style="animation-delay:0.45s" font-size="11">
      <tspan fill="#58a6ff" font-weight="600" filter="url(#glowB)" class="label-pulse"
        style="animation-delay:1s">FRONTEND </tspan>
      <tspan fill="#30363d"> </tspan>
      <tspan fill="#e6edf3">React</tspan>
      <tspan fill="#30363d"> · </tspan>
      <tspan fill="#e6edf3">Redux</tspan>
      <tspan fill="#30363d"> · </tspan>
      <tspan fill="#e6edf3">Tailwind</tspan>
      <tspan fill="#30363d"> · </tspan>
      <tspan fill="#e6edf3">Vite</tspan>
    </text>

    <!-- BACKEND — slide from left -->
    <text x="24" y="140" class="t sl" style="animation-delay:0.6s" font-size="11">
      <tspan fill="#00e5a0" font-weight="600" filter="url(#glow)" class="label-pulse"
        style="animation-delay:2s">BACKEND </tspan>
      <tspan fill="#30363d"> </tspan>
      <tspan fill="#e6edf3">Node.js</tspan>
      <tspan fill="#30363d"> · </tspan>
      <tspan fill="#e6edf3">Express</tspan>
      <tspan fill="#30363d"> · </tspan>
      <tspan fill="#e6edf3">Spring Boot</tspan>
      <tspan fill="#30363d"> · </tspan>
      <tspan fill="#e6edf3">GraphQL</tspan>
    </text>

    <!-- AWS — slide from right -->
    <text x="24" y="164" class="t sr" style="animation-delay:0.75s" font-size="11">
      <tspan fill="#58a6ff" font-weight="600" filter="url(#glowB)" class="label-pulse"
        style="animation-delay:3s">AWS </tspan>
      <tspan fill="#30363d"> </tspan>
      <tspan fill="#e6edf3">Lambda</tspan>
      <tspan fill="#30363d"> · </tspan>
      <tspan fill="#e6edf3">DynamoDB</tspan>
      <tspan fill="#30363d"> · </tspan>
      <tspan fill="#e6edf3">Step Fn</tspan>
      <tspan fill="#30363d"> · </tspan>
      <tspan fill="#e6edf3">ECS</tspan>
      <tspan fill="#30363d"> · </tspan>
      <tspan fill="#e6edf3">CDK</tspan>
      <tspan fill="#30363d"> · </tspan>
      <tspan fill="#e6edf3">API GW</tspan>
    </text>

    <!-- TOOLS — slide from left -->
    <text x="24" y="188" class="t sl" style="animation-delay:0.9s" font-size="11">
      <tspan fill="#00e5a0" font-weight="600" filter="url(#glow)" class="label-pulse"
        style="animation-delay:4s">TOOLS </tspan>
      <tspan fill="#30363d"> </tspan>
      <tspan fill="#e6edf3">Git</tspan>
      <tspan fill="#30363d"> · </tspan>
      <tspan fill="#e6edf3">Docker</tspan>
      <tspan fill="#30363d"> · </tspan>
      <tspan fill="#e6edf3">Jest</tspan>
      <tspan fill="#30363d"> · </tspan>
      <tspan fill="#e6edf3">CI/CD</tspan>
    </text>

    <!-- Animated bottom line -->
    <line x1="24" y1="206" x2="776" y2="206" stroke="#21262d" stroke-width="0.3"
      stroke-dasharray="752" stroke-dashoffset="752">
      <animate attributeName="stroke-dashoffset" from="752" to="0" dur="0.8s" begin="1.2s"
        fill="freeze" />
    </line>
    <line x1="24" y1="206" x2="776" y2="206" stroke="#00e5a0" stroke-width="0.2" opacity="0"
      stroke-dasharray="752" stroke-dashoffset="752">
      <animate attributeName="stroke-dashoffset" from="752" to="0" dur="0.8s" begin="1.2s"
        fill="freeze" />
      <animate attributeName="opacity" values="0;0.2;0" dur="3s" repeatCount="indefinite" begin="2s" />
    </line>
    <text x="24" y="226" class="t f" style="animation-delay:1.3s" font-size="10" fill="#484f58">5
      categories · 24 technologies</text>
  </g>
</svg>
