<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <radialGradient id="g1" cx="25%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="75%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#e6edf3" opacity="0.012"/>
    </pattern>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#00e5a0" flood-opacity="0.15"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0"/>
      <stop offset="40%" stop-color="#00e5a0" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes lineReveal { from { stroke-dashoffset: 280; } to { stroke-dashoffset: 0; } }
    @media (prefers-reduced-motion: reduce) {
      .a { opacity: 1 !important; animation: none !important; }
    }
    .name { font-family: 'SF Mono','Fira Code','Cascadia Code','Consolas',monospace; font-weight: 700; font-size: 52px; fill: #e6edf3; letter-spacing: 6px; opacity: 0; animation: fadeIn 1.2s cubic-bezier(0.16,1,0.3,1) 0.2s forwards; }
    .role { font-family: 'SF Mono','Fira Code','Cascadia Code','Consolas',monospace; font-weight: 400; font-size: 12px; fill: #6e7681; letter-spacing: 3.5px; text-transform: uppercase; opacity: 0; animation: fadeIn 1s cubic-bezier(0.16,1,0.3,1) 0.6s forwards; }
    .tag { font-family: 'SF Mono','Fira Code','Consolas',monospace; font-size: 11px; opacity: 0; animation: fadeIn 0.8s ease-out forwards; }
    .al { stroke-dasharray: 280; stroke-dashoffset: 280; animation: lineReveal 1.4s cubic-bezier(0.16,1,0.3,1) 0.4s forwards; }
  </style>

  <rect width="1200" height="300" fill="#0d1117"/>
  <rect width="1200" height="300" fill="url(#g1)"/>
  <rect width="1200" height="300" fill="url(#g2)"/>
  <rect width="1200" height="300" fill="url(#scan)"/>

  <g opacity="0.25"><line x1="40" y1="36" x2="68" y2="36" stroke="#00e5a0" stroke-width="1"/><line x1="40" y1="36" x2="40" y2="64" stroke="#00e5a0" stroke-width="1"/></g>
  <g opacity="0.25"><line x1="1132" y1="36" x2="1160" y2="36" stroke="#58a6ff" stroke-width="1"/><line x1="1160" y1="36" x2="1160" y2="64" stroke="#58a6ff" stroke-width="1"/></g>
  <g opacity="0.15"><line x1="40" y1="264" x2="40" y2="236" stroke="#00e5a0" stroke-width="0.5"/><line x1="40" y1="264" x2="68" y2="264" stroke="#00e5a0" stroke-width="0.5"/></g>
  <g opacity="0.15"><line x1="1160" y1="264" x2="1160" y2="236" stroke="#58a6ff" stroke-width="0.5"/><line x1="1160" y1="264" x2="1132" y2="264" stroke="#58a6ff" stroke-width="0.5"/></g>

  <line x1="460" y1="162" x2="740" y2="162" stroke="url(#accentLine)" stroke-width="1" class="al"/>
  <text x="600" y="132" text-anchor="middle" class="name a" filter="url(#textGlow)">PRAKHAR SHEKHAR</text>
  <text x="600" y="198" text-anchor="middle" class="role a">Software Engineer  ·  System Architect  ·  Open Source</text>
  <text x="60" y="282" class="tag a" style="animation-delay:1s"><tspan fill="#6e7681">~/</tspan><tspan fill="#00e5a0">prakhar</tspan></text>
  <text x="1140" y="282" text-anchor="end" class="tag a" style="animation-delay:1.2s" fill="#6e7681">v2026.3</text>
  <rect y="270" width="1200" height="30" fill="url(#bottomFade)"/>
</svg>
