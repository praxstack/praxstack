<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="100%" height="100%">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5a0" />
      <stop offset="50%" stop-color="#58a6ff" />
      <stop offset="100%" stop-color="#00e5a0" />
    </linearGradient>

    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.15" />
      <stop offset="60%" stop-color="#00e5a0" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0d12" />
      <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>

    <filter id="ultraGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="mildGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="techGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#58a6ff" stroke-width="1"
        stroke-opacity="0.05" />
      <circle cx="40" cy="40" r="1" fill="#00e5a0" opacity="0.3" />
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  <rect width="100%" height="100%" fill="url(#techGrid)">
    <animate attributeName="opacity" values="0.3; 0.8; 0.3" dur="8s" repeatCount="indefinite" />
  </rect>
  <circle cx="600" cy="300" r="400" fill="url(#coreGlow)">
    <animate attributeName="r" values="350; 450; 350" dur="6s" repeatCount="indefinite" />
  </circle>

  <g transform="translate(150, 300)">
    <g opacity="0.6">
      <circle cx="0" cy="0" r="120" fill="none" stroke="#00e5a0" stroke-width="1"
        stroke-dasharray="4 8" opacity="0.5">
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="20s"
          repeatCount="indefinite" />
      </circle>
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="20s"
          repeatCount="indefinite" />
        <g transform="translate(120, 0)">
          <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="20s"
            repeatCount="indefinite" />
          <g fill="none" stroke="#00e5a0" stroke-width="1.5" filter="url(#softGlow)">
            <ellipse rx="12" ry="4" transform="rotate(0)" />
            <ellipse rx="12" ry="4" transform="rotate(60)" />
            <ellipse rx="12" ry="4" transform="rotate(120)" />
            <circle r="2" fill="#00e5a0" />
          </g>
        </g>
      </g>
    </g>

    <circle cx="0" cy="0" r="90" fill="none" stroke="#58a6ff" stroke-width="2"
      stroke-dasharray="60 40 20 40" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s"
        repeatCount="indefinite" />
    </circle>

    <g opacity="0.6">
      <circle cx="0" cy="0" r="60" fill="none" stroke="#00e5a0" stroke-width="1"
        stroke-dasharray="10 20">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="8s"
          repeatCount="indefinite" />
      </circle>
      <g>
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="8s"
          repeatCount="indefinite" />
        <g transform="translate(60, 0)">
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s"
            repeatCount="indefinite" />
          <g fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round" filter="url(#softGlow)">
            <polyline points="-6,-5 -1,0 -6,5" />
            <line x1="1" y1="5" x2="7" y2="5" />
          </g>
        </g>
      </g>
    </g>

    <circle cx="0" cy="0" r="4" fill="#58a6ff" filter="url(#ultraGlow)">
      <animate attributeName="opacity" values="0.2; 1; 0.2" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>

  <g transform="translate(1050, 300)">
    <g opacity="0.6">
      <circle cx="0" cy="0" r="120" fill="none" stroke="#58a6ff" stroke-width="1"
        stroke-dasharray="4 8" opacity="0.5">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s"
          repeatCount="indefinite" />
      </circle>
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s"
          repeatCount="indefinite" />
        <g transform="translate(-120, 0)">
          <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="20s"
            repeatCount="indefinite" />
          <g fill="none" stroke="#58a6ff" stroke-width="1.5" filter="url(#softGlow)"
            transform="scale(0.85)">
            <rect x="-10" y="-12" width="20" height="6" rx="2" />
            <rect x="-10" y="-2" width="20" height="6" rx="2" />
            <rect x="-10" y="8" width="20" height="6" rx="2" />
          </g>
        </g>
      </g>
    </g>

    <circle cx="0" cy="0" r="90" fill="none" stroke="#00e5a0" stroke-width="2"
      stroke-dasharray="60 40 20 40" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s"
        repeatCount="indefinite" />
    </circle>

    <g opacity="0.6">
      <circle cx="0" cy="0" r="60" fill="none" stroke="#58a6ff" stroke-width="1"
        stroke-dasharray="10 20">
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="10s"
          repeatCount="indefinite" />
      </circle>
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="10s"
          repeatCount="indefinite" />
        <g transform="translate(-60, 0)">
          <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="10s"
            repeatCount="indefinite" />
          <g fill="none" stroke="#00e5a0" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round" filter="url(#softGlow)" transform="scale(0.8)">
            <path
              d="M -5,8 L 5,8 Q 12,8 12,1 Q 12,-4 7,-5 Q 5,-12 -2,-12 Q -8,-12 -10,-6 Q -15,-6 -15,1 Q -15,8 -5,8 Z" />
          </g>
        </g>
      </g>
    </g>

    <circle cx="0" cy="0" r="4" fill="#00e5a0" filter="url(#ultraGlow)">
      <animate attributeName="opacity" values="0.2; 1; 0.2" dur="2.5s" repeatCount="indefinite" />
    </circle>
  </g>

  <g opacity="0.4" filter="url(#softGlow)">
    <path d="M -100 350 Q 300 150 600 350 T 1300 350" fill="none" stroke="#58a6ff" stroke-width="2"
      stroke-dasharray="100 50">
      <animate attributeName="stroke-dashoffset" from="150" to="0" dur="3s" repeatCount="indefinite"
        linear="true" />
    </path>
    <path d="M -100 250 Q 300 450 600 250 T 1300 250" fill="none" stroke="#00e5a0"
      stroke-width="1.5" stroke-dasharray="50 100">
      <animate attributeName="stroke-dashoffset" from="0" to="150" dur="4s" repeatCount="indefinite"
        linear="true" />
    </path>
  </g>

  <g stroke="url(#brandGrad)" stroke-width="2" fill="none" opacity="0.8">
    <path d="M 40 100 L 40 40 L 100 40" filter="url(#softGlow)" />
    <path d="M 1160 100 L 1160 40 L 1100 40" filter="url(#softGlow)" />
    <path d="M 40 500 L 40 560 L 100 560" filter="url(#softGlow)" />
    <path d="M 1160 500 L 1160 560 L 1100 560" filter="url(#softGlow)" />
  </g>

  <g text-anchor="middle">
    <text x="600" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="52"
      font-weight="900" fill="#ffffff" letter-spacing="6" filter="url(#mildGlow)"> PRAKHAR SHEKHAR
      PARTHASARTHI <animate attributeName="opacity" values="0.8; 1; 0.8" dur="4s"
        repeatCount="indefinite" />
    </text>

    <rect x="150" y="320" width="900" height="60" rx="8" fill="#0d1117" stroke="#58a6ff"
      stroke-width="1" opacity="0.8" filter="url(#softGlow)">
      <animate attributeName="stroke-opacity" values="0.3; 1; 0.3" dur="3s" repeatCount="indefinite" />
    </rect>

    <text x="600" y="357" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="20"
      font-weight="600" fill="#e6edf3" letter-spacing="1">
      <tspan fill="#58a6ff">const</tspan> role = [ <tspan fill="#00e5a0">"Software Engineer"</tspan>
      , <tspan fill="#00e5a0">"System Architect"</tspan> ]; <tspan fill="#58a6ff"
        filter="url(#ultraGlow)"> _ <animate attributeName="opacity" values="0; 1; 0" dur="1s"
          repeatCount="indefinite" />
      </tspan>
    </text>
  </g>

  <g font-family="'SF Mono', 'Fira Code', monospace" font-size="16" font-weight="bold"
    fill="#6e7681" opacity="0.8">
    <text x="60" y="540">
      <tspan fill="#58a6ff">~/</tspan>
      <tspan fill="#00e5a0">workspace/prakhar</tspan>
      <animate attributeName="y" values="540; 535; 540" dur="4s" repeatCount="indefinite" />
    </text>

    <text x="1140" y="540" text-anchor="end"> SYS.v2026.3 <tspan fill="#00e5a0">ONLINE</tspan>
      <animate
        attributeName="y" values="540; 545; 540" dur="5s" repeatCount="indefinite" />
    </text>
  </g>

  <g fill="#00e5a0" opacity="0.6" filter="url(#softGlow)">
    <circle cx="300" cy="500" r="2">
      <animateTransform attributeName="transform" type="translate" values="0,0; 20,-40; 0,0"
        dur="6s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 0.8; 0" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="850" cy="150" r="3" fill="#58a6ff">
      <animateTransform attributeName="transform" type="translate" values="0,0; -30,20; 0,0"
        dur="8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 0.8; 0" dur="8s" repeatCount="indefinite" />
    </circle>
    <circle cx="500" cy="100" r="1.5">
      <animateTransform attributeName="transform" type="translate" values="0,0; 10,-20; 0,0"
        dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0; 0.5; 0" dur="4s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
