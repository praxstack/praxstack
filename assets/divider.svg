<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 60" width="100%" height="100%" role="img" aria-labelledby="divider-title divider-desc">
  <title id="divider-title">Section divider</title>
  <desc id="divider-desc">Thin animated divider used between README sections.</desc>
  <defs>
    <linearGradient id="laserBeam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0" />
      <stop offset="20%" stop-color="#00e5a0" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="1" />
      <stop offset="80%" stop-color="#00e5a0" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0" />
    </linearGradient>

    <filter id="neonPulse" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(400, 30)">
    <circle cx="0" cy="0" r="0" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.8">
      <animate attributeName="r" values="0; 40" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8; 0" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="0" fill="none" stroke="#00e5a0" stroke-width="0.5" opacity="0.6">
      <animate attributeName="r" values="0; 30" dur="2s" begin="1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6; 0" dur="2s" begin="1s" repeatCount="indefinite" />
    </circle>
  </g>

  <path d="M 50 30 L 750 30" stroke="url(#laserBeam)" stroke-width="2" filter="url(#neonPulse)">
    <animate attributeName="opacity" values="0.6; 1; 0.6" dur="2s" repeatCount="indefinite" />
  </path>

  <g filter="url(#neonPulse)">
    <line x1="400" y1="30" x2="430" y2="30" stroke="#ffffff" stroke-width="3" stroke-linecap="round">
      <animate attributeName="x1" values="400; 750" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="x2" values="430; 780" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1; 0" dur="1.5s" repeatCount="indefinite" />
    </line>
    <line x1="400" y1="30" x2="370" y2="30" stroke="#ffffff" stroke-width="3" stroke-linecap="round">
      <animate attributeName="x1" values="400; 50" dur="1.2s" repeatCount="indefinite" />
      <animate attributeName="x2" values="370; 20" dur="1.2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1; 0" dur="1.2s" repeatCount="indefinite" />
    </line>
  </g>

  <g transform="translate(400, 30)" filter="url(#neonPulse)">
    <rect x="-8" y="-8" width="16" height="16" fill="#0d1117" stroke="#00e5a0" stroke-width="1.5"
      transform="rotate(45)">
      <animateTransform attributeName="transform" type="rotate" values="45; 405" dur="6s"
        repeatCount="indefinite" />
    </rect>
    <rect x="-4" y="-4" width="8" height="8" fill="none" stroke="#58a6ff" stroke-width="1.5"
      transform="rotate(0)">
      <animateTransform attributeName="transform" type="rotate" values="360; 0" dur="4s"
        repeatCount="indefinite" />
    </rect>
    <circle cx="0" cy="0" r="2" fill="#ffffff">
      <animate attributeName="opacity" values="0.2; 1; 0.2" dur="1s" repeatCount="indefinite" />
    </circle>
  </g>

  <g fill="none" stroke-width="1.5" filter="url(#softGlow)">
    <path d="M 60 20 L 40 20 L 40 40 L 60 40" stroke="#00e5a0" opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.3; 1; 0.3" dur="3s" repeatCount="indefinite" />
    </path>
    <rect x="30" y="28" width="4" height="4" fill="#58a6ff" opacity="0.8">
      <animate attributeName="opacity" values="0; 1; 0" dur="2s" repeatCount="indefinite" />
    </rect>

    <path d="M 740 20 L 760 20 L 760 40 L 740 40" stroke="#58a6ff" opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.3; 1; 0.3" dur="4s" repeatCount="indefinite" />
    </path>
    <rect x="766" y="28" width="4" height="4" fill="#00e5a0" opacity="0.8">
      <animate attributeName="opacity" values="0; 1; 0" dur="2.5s" repeatCount="indefinite" />
    </rect>
  </g>

  <g fill="#e6edf3" filter="url(#softGlow)" opacity="0.6">
    <rect x="70" y="28" width="6" height="4" rx="1">
      <animate attributeName="opacity" values="0.1; 0.8; 0.1" dur="1s" repeatCount="indefinite" />
    </rect>
    <rect x="80" y="28" width="6" height="4" rx="1">
      <animate attributeName="opacity" values="0.1; 0.8; 0.1" dur="1s" begin="0.3s"
        repeatCount="indefinite" />
    </rect>

    <rect x="724" y="28" width="6" height="4" rx="1">
      <animate attributeName="opacity" values="0.1; 0.8; 0.1" dur="1.2s" repeatCount="indefinite" />
    </rect>
    <rect x="714" y="28" width="6" height="4" rx="1">
      <animate attributeName="opacity" values="0.1; 0.8; 0.1" dur="1.2s" begin="0.4s"
        repeatCount="indefinite" />
    </rect>
  </g>
</svg>
