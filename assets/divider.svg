<svg xmlns="http://www.w3.org/2000/svg" width="800" height="8" viewBox="0 0 800 8">
  <defs>
    <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="30%" stop-color="#00e5a0" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="0.2" />
      <stop offset="70%" stop-color="#00e5a0" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#0d1117" />
    </linearGradient>
    <!-- Sweeping shimmer gradient -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0">
        <animate attributeName="offset" values="-0.3;1.3" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="5%" stop-color="#00e5a0" stop-opacity="0.6">
        <animate attributeName="offset" values="-0.25;1.35" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="10%" stop-color="#58a6ff" stop-opacity="0.4">
        <animate attributeName="offset" values="-0.2;1.4" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="15%" stop-color="#00e5a0" stop-opacity="0">
        <animate attributeName="offset" values="-0.15;1.45" dur="3s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>
  <!-- Base line -->
  <line x1="0" y1="4" x2="800" y2="4" stroke="url(#dg)" stroke-width="0.5" />
  <!-- Animated shimmer overlay -->
  <line x1="0" y1="4" x2="800" y2="4" stroke="url(#shimmer)" stroke-width="1" opacity="0.5" />
</svg>
