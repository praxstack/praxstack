<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%" role="img" aria-labelledby="footer-title footer-desc">
  <title id="footer-title">Footer — praxstack profile</title>
  <desc id="footer-desc">Animated footer banner with neon brand gradient and scanline overlay closing praxstack's GitHub profile README.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0d12" />
      <stop offset="100%" stop-color="#05070a" />
    </linearGradient>

    <linearGradient id="neonBrand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5a0">
        <animate attributeName="stop-color" values="#00e5a0;#58a6ff;#00e5a0" dur="4s"
          repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#58a6ff">
        <animate attributeName="stop-color" values="#58a6ff;#00e5a0;#58a6ff" dur="4s"
          repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <filter id="ultraGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#ffffff" opacity="0.02" />
    </pattern>
  </defs>

  <!-- Background — brand-consistent -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  <rect width="100%" height="100%" fill="url(#scanlines)" pointer-events="none" />

  <!-- Subtle rotating rings -->
  <g transform="translate(600, 200)" opacity="0.25">
    <circle cx="0" cy="0" r="180" fill="none" stroke="#00e5a0" stroke-width="1"
      stroke-dasharray="10 30 50 20">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s"
        repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="160" fill="none" stroke="#58a6ff" stroke-width="1.5"
      stroke-dasharray="60 40 20 40">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="20s"
        repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Floating particles -->
  <g filter="url(#softGlow)">
    <circle cx="250" cy="100" r="2" fill="#00e5a0" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="0,0;15,-20" dur="4s"
        repeatCount="indefinite" />
    </circle>
    <circle cx="950" cy="300" r="3" fill="#58a6ff" opacity="0">
      <animate attributeName="opacity" values="0;0.5;0" dur="5s" repeatCount="indefinite" begin="1s" />
      <animateTransform attributeName="transform" type="translate" values="0,0;-10,15" dur="5s"
        repeatCount="indefinite" begin="1s" />
    </circle>
    <circle cx="400" cy="320" r="1.5" fill="#e6edf3" opacity="0">
      <animate attributeName="opacity" values="0;0.3;0" dur="3s" repeatCount="indefinite" begin="2s" />
      <animateTransform attributeName="transform" type="translate" values="0,0;8,-12" dur="3s"
        repeatCount="indefinite" begin="2s" />
    </circle>
  </g>

  <!-- Accent line -->
  <path d="M 250 200 L 950 200" stroke="url(#neonBrand)" stroke-width="1.5" filter="url(#softGlow)"
    opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite" />
  </path>

  <!-- Main text -->
  <g text-anchor="middle">
    <text x="600" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="42"
      font-weight="900" fill="#ffffff" letter-spacing="6" filter="url(#softGlow)"> BUILT WITH
      CONVICTION <animate attributeName="opacity" values="0;1" dur="1.2s" fill="freeze" />
    </text>

    <text x="600" y="260" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="28"
      font-weight="700" fill="url(#neonBrand)" letter-spacing="8" filter="url(#ultraGlow)"> SHIPPED
      WITH CARE <animate attributeName="opacity" values="0;1" dur="1.2s" begin="0.4s" fill="freeze" />
    </text>
  </g>

  <!-- Heart icon -->
  <g transform="translate(600, 320)" filter="url(#ultraGlow)">
    <g>
      <animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="1.5s"
        repeatCount="indefinite" />
      <path
        d="M0 8l-1-0.9C-4.7 4.1-7 2-7 -0.6c0-2.1 1.7-3.8 3.8-3.8 1.2 0 2.3.55 3.1 1.4C0.6-3.85 1.7-4.4 2.9-4.4 5-4.4 6.7-2.7 6.7-0.6 6.7 2 4.4 4.1 0.7 7.1L0 8z"
        fill="none" stroke="url(#neonBrand)" stroke-width="1.5" />
    </g>
  </g>

  <!-- Corner brackets -->
  <g stroke="url(#neonBrand)" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M 80 60 L 80 30 L 110 30" filter="url(#softGlow)">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite" />
    </path>
    <path d="M 1120 60 L 1120 30 L 1090 30" filter="url(#softGlow)">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"
        begin="1s" />
    </path>
    <path d="M 80 340 L 80 370 L 110 370" filter="url(#softGlow)">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"
        begin="2s" />
    </path>
    <path d="M 1120 340 L 1120 370 L 1090 370" filter="url(#softGlow)">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"
        begin="3s" />
    </path>
  </g>
</svg>
