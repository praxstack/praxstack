<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="120" viewBox="0 0 1200 120">
  <defs>
    <linearGradient id="footerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00e5a0" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="waveFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <pattern id="footerGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.3" opacity="0.3"/>
    </pattern>
  </defs>
  
  <rect width="1200" height="120" fill="#0d1117"/>
  <rect width="1200" height="120" fill="url(#footerGrid)" opacity="0.2"/>
  
  <!-- Wave path -->
  <path d="M0,40 C200,10 400,70 600,40 C800,10 1000,70 1200,40 L1200,120 L0,120 Z" fill="url(#footerGrad)"/>
  <path d="M0,40 C200,10 400,70 600,40 C800,10 1000,70 1200,40" fill="none" stroke="url(#footerLine)" stroke-width="1"/>
  
  <linearGradient id="footerLine" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00e5a0" stop-opacity="0"/>
    <stop offset="25%" stop-color="#00e5a0" stop-opacity="0.5"/>
    <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.5"/>
    <stop offset="75%" stop-color="#00e5a0" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
  </linearGradient>
  
  <!-- Corner accents -->
  <line x1="30" y1="100" x2="30" y2="80" stroke="#00e5a0" stroke-width="0.5" opacity="0.4"/>
  <line x1="30" y1="100" x2="50" y2="100" stroke="#00e5a0" stroke-width="0.5" opacity="0.4"/>
  <line x1="1170" y1="100" x2="1170" y2="80" stroke="#a78bfa" stroke-width="0.5" opacity="0.4"/>
  <line x1="1170" y1="100" x2="1150" y2="100" stroke="#a78bfa" stroke-width="0.5" opacity="0.4"/>
  
  <text x="600" y="95" text-anchor="middle" font-family="Courier New, monospace" font-size="10" fill="#374151" letter-spacing="3">
    BUILT WITH CONVICTION · SHIPPED WITH CARE
  </text>
</svg>