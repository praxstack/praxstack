<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="60" viewBox="0 0 1200 60">
  <defs>
    <linearGradient id="fl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0" />
      <stop offset="30%" stop-color="#00e5a0" stop-opacity="0.25" />
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="0.15" />
      <stop offset="70%" stop-color="#00e5a0" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00e5a0" stop-opacity="0" />
    </linearGradient>
    <!-- Sweeping shimmer for footer line -->
    <linearGradient id="footerShimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0">
        <animate attributeName="offset" values="-0.2;1.2" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="5%" stop-color="#58a6ff" stop-opacity="0.5">
        <animate attributeName="offset" values="-0.15;1.25" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="10%" stop-color="#00e5a0" stop-opacity="0">
        <animate attributeName="offset" values="-0.1;1.3" dur="4s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="1.5" result="b" />
      <feFlood flood-color="#6e7681" flood-opacity="0.15" />
      <feComposite in2="b" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes textBreath { 0%,100% { opacity: 0.65; } 50% { opacity: 0.85; } }
    @media (prefers-reduced-motion: reduce) { .fa { opacity: 0.75 !important; animation: none
    !important; } }
    .fa { opacity: 0; animation: fadeIn 1s ease-out 0.3s forwards; }
    .breath { animation: textBreath 5s ease-in-out infinite; }
  </style>

  <rect width="1200" height="60" fill="#0d1117" />

  <!-- Base line -->
  <line x1="200" y1="20" x2="1000" y2="20" stroke="url(#fl)" stroke-width="0.5" />
  <!-- Animated shimmer on line -->
  <line x1="200" y1="20" x2="1000" y2="20" stroke="url(#footerShimmer)" stroke-width="0.8"
    opacity="0.4" />

  <!-- Text with subtle glow and breathing -->
  <text x="600" y="44" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace"
    font-size="10" fill="#6e7681" letter-spacing="3.5" filter="url(#textGlow)" class="fa breath">
    BUILT WITH CONVICTION · SHIPPED WITH CARE
  </text>
</svg>
