<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="100%" height="100%">
  <defs>
    <linearGradient id="neonBrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5a0">
        <animate attributeName="stop-color" values="#00e5a0;#58a6ff;#00e5a0" dur="4s"
          repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#58a6ff">
        <animate attributeName="stop-color" values="#58a6ff;#00e5a0;#58a6ff" dur="4s"
          repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#14142b" />
      <stop offset="100%" stop-color="#05050f" />
    </linearGradient>

    <filter id="ultraGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="techGrid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="1"
        stroke-opacity="0.04" />
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGlow)" />

  <rect width="100%" height="100%" fill="url(#techGrid)">
    <animate attributeName="opacity" values="0.2; 1; 0.2" dur="6s" repeatCount="indefinite" />
  </rect>

  <g font-family="monospace" font-size="280" font-weight="bold" fill="url(#neonBrand)"
    opacity="0.03">
    <text x="50" y="420"> &lt; <animate attributeName="x" values="50; 20; 50" dur="8s"
        repeatCount="indefinite" />
    </text>
    <text x="1050" y="420"> /&gt; <animate attributeName="x" values="1050; 1080; 1050" dur="8s"
        repeatCount="indefinite" />
    </text>
  </g>

  <g transform="translate(600, 300)" opacity="0.4">
    <circle cx="0" cy="0" r="280" fill="none" stroke="#00e5a0" stroke-width="1"
      stroke-dasharray="10 30 50 20">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s"
        repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="260" fill="none" stroke="#58a6ff" stroke-width="2"
      stroke-dasharray="100 50 20 40">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="20s"
        repeatCount="indefinite" />
    </circle>
  </g>

  <g filter="url(#ultraGlow)">
    <circle cx="250" cy="150" r="4" fill="#00e5a0">
      <animate attributeName="cy" values="150; 100; 150" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2; 1; 0.2" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="950" cy="450" r="6" fill="#58a6ff">
      <animate attributeName="cy" values="450; 500; 450" dur="5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2; 1; 0.2" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="200" cy="450" r="3" fill="#ffffff">
      <animate attributeName="cy" values="450; 410; 450" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.1; 0.8; 0.1" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>

  <path d="M 200 300 L 1000 300" stroke="url(#neonBrand)" stroke-width="2" filter="url(#ultraGlow)"
    opacity="0.6">
    <animate attributeName="opacity" values="0.3; 0.9; 0.3" dur="3s" repeatCount="indefinite" />
  </path>

  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    text-anchor="middle">

    <text x="600" y="240" font-size="56" font-weight="900" fill="#ffffff" letter-spacing="8"> BUILT
      WITH CONVICTION <animate attributeName="opacity" values="0; 1" dur="1.5s" fill="freeze" />
      <animate
        attributeName="y" values="260; 240" dur="1.5s" calcMode="spline" keySplines="0.1 0.8 0.2 1"
        fill="freeze" />
    </text>

    <text x="600" y="380" font-size="42" font-weight="700" fill="url(#neonBrand)"
      letter-spacing="12" filter="url(#ultraGlow)"> SHIPPED WITH CARE <animate
        attributeName="opacity" values="0; 1" dur="1.5s" begin="0.5s" fill="freeze" />
      <animate
        attributeName="y" values="400; 380" dur="1.5s" begin="0.5s" calcMode="spline"
        keySplines="0.1 0.8 0.2 1" fill="freeze" />
    </text>
  </g>

  <g transform="translate(600, 460)">
    <g filter="url(#ultraGlow)">
      <animateTransform attributeName="transform" type="scale" values="1; 1.25; 1" dur="1.2s"
        repeatCount="indefinite" />
      <path
        d="M0 12l-1.45-1.32C-6.8 6 -10.2 2.92 -10.2 -0.86 -10.2 -3.94 -7.78 -6.36 -4.7 -6.36c1.74 0 3.41.81 4.5 2.09C0.89 -5.55 2.56 -6.36 4.3 -6.36 7.38 -6.36 9.8 -3.94 9.8 -0.86c0 3.78-3.4 6.86-8.55 11.54L0 12z"
        fill="none" stroke="url(#neonBrand)" stroke-width="2" />
    </g>
  </g>
</svg>
