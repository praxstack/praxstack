<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="crt" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.015"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#ffffff" opacity="0.007"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feFlood flood-color="#00e5a0" flood-opacity="0.3"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="tl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.4"/>
    </linearGradient>
    <clipPath id="wc"><rect width="800" height="400" rx="8"/></clipPath>
  </defs>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse { 0%,100% { opacity: 0.85; } 50% { opacity: 0.12; } }
    @media (prefers-reduced-motion: reduce) { .f { opacity: 1 !important; animation: none !important; } }
    .t { font-family: 'SF Mono','Fira Code','Cascadia Code','Consolas',monospace; }
    .f { opacity: 0; animation: fadeIn 0.35s ease-out forwards; }
  </style>

  <g clip-path="url(#wc)">
    <rect width="800" height="400" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
    <rect x="1" y="1" width="798" height="34" rx="7" fill="#161b22"/>
    <rect x="1" y="20" width="798" height="16" fill="#161b22"/>
    <line x1="0" y1="35" x2="800" y2="35" stroke="#21262d" stroke-width="0.5"/>
    <circle cx="20" cy="18" r="5" fill="#ff5f57" opacity="0.8"/>
    <circle cx="36" cy="18" r="5" fill="#febc2e" opacity="0.8"/>
    <circle cx="52" cy="18" r="5" fill="#28c840" opacity="0.8"/>
    <text x="400" y="22" text-anchor="middle" class="t" font-size="11" fill="#6e7681">git log --career</text>
    <rect x="1" y="36" width="798" height="363" fill="url(#crt)"/>
    <rect x="1" y="36" width="798" height="363" fill="url(#scan)"/>

    <!-- Command -->
    <text x="24" y="62" class="t f" style="animation-delay:0.1s" font-size="13">
      <tspan fill="#00e5a0" filter="url(#glow)">$</tspan><tspan fill="#e6edf3"> git log --oneline career</tspan>
    </text>

    <!-- HEAD label -->
    <text x="24" y="86" class="t f" style="animation-delay:0.25s" font-size="9" fill="#00e5a0" font-weight="600" letter-spacing="1">HEAD</text>

    <!-- Timeline line -->
    <line x1="38" y1="94" x2="38" y2="350" stroke="url(#tl)" stroke-width="1.5" class="f" style="animation-delay:0.3s"/>

    <!-- Entry 1 — LEFT Amazon -->
    <g class="f" style="animation-delay:0.35s">
      <circle cx="38" cy="106" r="4" fill="#0d1117" stroke="#00e5a0" stroke-width="1.5"/>
      <text x="56" y="102" class="t" font-size="10" fill="#00e5a0" font-weight="600">Sep 2025</text>
      <text x="56" y="116" class="t" font-size="11" fill="#e6edf3">LEFT Amazon — Ready for the next chapter</text>
    </g>

    <!-- Entry 2 — Amazon Pay -->
    <g class="f" style="animation-delay:0.5s">
      <circle cx="38" cy="144" r="3" fill="#0d1117" stroke="#00e5a0" stroke-width="1.5"/>
      <text x="56" y="140" class="t" font-size="10" fill="#00e5a0">2023</text>
      <text x="112" y="140" class="t" font-size="11" fill="#e6edf3">Amazon Pay — Trust-Buster Champion</text>
      <text x="112" y="156" class="t" font-size="10" fill="#6e7681">Resolved 100+ bugs, cut on-call tickets 75%</text>
    </g>

    <!-- Entry 3 — Hotel Booking -->
    <g class="f" style="animation-delay:0.65s">
      <circle cx="38" cy="182" r="3" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
      <text x="56" y="178" class="t" font-size="10" fill="#58a6ff">2023</text>
      <text x="112" y="178" class="t" font-size="11" fill="#e6edf3">Hotel Booking Platform — Travel</text>
      <text x="112" y="194" class="t" font-size="10" fill="#6e7681">p90 latency 47%↓ · conversion 33%↑ · GZIP 95%↓</text>
    </g>

    <!-- Entry 4 — Event-Driven -->
    <g class="f" style="animation-delay:0.8s">
      <circle cx="38" cy="220" r="3" fill="#0d1117" stroke="#00e5a0" stroke-width="1.5"/>
      <text x="56" y="216" class="t" font-size="10" fill="#00e5a0">2022</text>
      <text x="112" y="216" class="t" font-size="11" fill="#e6edf3">Event-Driven Architecture — Travel</text>
      <text x="112" y="232" class="t" font-size="10" fill="#6e7681">Webhook service (idempotency + audit) · 43 bps CPT↓</text>
    </g>

    <!-- Entry 5 — Milestoning -->
    <g class="f" style="animation-delay:0.95s">
      <circle cx="38" cy="258" r="3" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
      <text x="56" y="254" class="t" font-size="10" fill="#58a6ff">2022</text>
      <text x="112" y="254" class="t" font-size="11" fill="#e6edf3">Auto-Insurance Milestoning — Payments</text>
      <text x="112" y="270" class="t" font-size="10" fill="#6e7681">Multi-stage renewal flows → 60% more renewals</text>
    </g>

    <!-- Entry 6 — Joined Amazon -->
    <g class="f" style="animation-delay:1.1s">
      <circle cx="38" cy="296" r="3" fill="#0d1117" stroke="#00e5a0" stroke-width="1.5"/>
      <text x="56" y="292" class="t" font-size="10" fill="#00e5a0">Jul 2022</text>
      <text x="126" y="292" class="t" font-size="11" fill="#e6edf3">Joined Amazon as SDE (Full-Time)</text>
    </g>

    <!-- Entry 7 — Intern -->
    <g class="f" style="animation-delay:1.2s">
      <circle cx="38" cy="318" r="3" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
      <text x="56" y="314" class="t" font-size="10" fill="#58a6ff">2021-22</text>
      <text x="126" y="314" class="t" font-size="11" fill="#e6edf3">Amazon SDE Intern × 2 — Renewal · GraphQL Migration</text>
    </g>

    <!-- Entry 8 — Education -->
    <g class="f" style="animation-delay:1.3s">
      <circle cx="38" cy="340" r="3" fill="#0d1117" stroke="#00e5a0" stroke-width="1.5"/>
      <text x="56" y="336" class="t" font-size="10" fill="#00e5a0">2022</text>
      <text x="112" y="336" class="t" font-size="11" fill="#e6edf3">MCA — MNNIT Prayagraj (GPA: 9.25)</text>
    </g>

    <!-- End marker -->
    <circle cx="38" cy="354" r="2" fill="#30363d" class="f" style="animation-delay:1.4s"/>

    <!-- Cursor -->
    <text x="24" y="382" class="t f" style="animation-delay:1.5s" font-size="13" fill="#00e5a0" filter="url(#glow)">$</text>
    <rect x="38" y="370" width="2" height="15" rx="1" fill="#00e5a0" opacity="0.85" style="animation: pulse 1.4s cubic-bezier(0.4,0,0.6,1) 1.6s infinite;"/>
  </g>
</svg>
