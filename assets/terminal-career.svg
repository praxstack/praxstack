<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="crt" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.015" />
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0" />
    </radialGradient>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#ffffff" opacity="0.007" />
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b" />
      <feFlood flood-color="#00e5a0" flood-opacity="0.3" />
      <feComposite in2="b" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowB">
      <feGaussianBlur stdDeviation="3" result="b" />
      <feFlood flood-color="#58a6ff" flood-opacity="0.3" />
      <feComposite in2="b" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="4" result="b" />
      <feFlood flood-color="#00e5a0" flood-opacity="0.4" />
      <feComposite in2="b" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="nodeGlowB">
      <feGaussianBlur stdDeviation="4" result="b" />
      <feFlood flood-color="#58a6ff" flood-opacity="0.4" />
      <feComposite in2="b" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="tl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.4" />
    </linearGradient>
    <linearGradient id="borderGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.2" />
    </linearGradient>
    <clipPath id="wc">
      <rect width="800" height="400" rx="8" />
    </clipPath>
  </defs>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1;
    transform: translateX(0); } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(15px); } to { opacity: 1;
    transform: translateX(0); } }
    @keyframes pulse { 0%,100% { opacity: 0.85; } 50% { opacity: 0.12; } }
    @keyframes nodePulse { 0%,100% { r: 4; opacity: 1; } 50% { r: 6; opacity: 0.6; } }
    @keyframes nodePulseSmall { 0%,100% { r: 3; opacity: 1; } 50% { r: 5; opacity: 0.6; } }
    @keyframes dotBounce { 0%,100% { r: 5; } 50% { r: 5.5; } }
    @keyframes ripple { 0% { r: 4; opacity: 0.4; } 100% { r: 16; opacity: 0; } }
    @keyframes headGlow { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) { .f, .sl, .sr { opacity: 1 !important; animation: none
    !important; transform: none !important; } }
    .t { font-family: 'SF Mono','Fira Code','Cascadia Code','Consolas',monospace; }
    .f { opacity: 0; animation: fadeIn 0.35s ease-out forwards; }
    .sl { opacity: 0; animation: slideInLeft 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
    .sr { opacity: 0; animation: slideInRight 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
    .traffic { animation: dotBounce 2s ease-in-out infinite; }
  </style>

  <g clip-path="url(#wc)">
    <rect width="800" height="400" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1" />
    <rect width="800" height="400" rx="8" fill="none" stroke="url(#borderGlow)" stroke-width="0.5"
      opacity="0">
      <animate attributeName="opacity" values="0;0.3;0" dur="5s" repeatCount="indefinite" begin="2s" />
    </rect>

    <rect x="1" y="1" width="798" height="34" rx="7" fill="#161b22" />
    <rect x="1" y="20" width="798" height="16" fill="#161b22" />
    <line x1="0" y1="35" x2="800" y2="35" stroke="#21262d" stroke-width="0.5" />
    <circle cx="20" cy="18" r="5" fill="#ff5f57" opacity="0.8" class="traffic" />
    <circle cx="36" cy="18" r="5" fill="#febc2e" opacity="0.8" class="traffic"
      style="animation-delay:0.3s" />
    <circle cx="52" cy="18" r="5" fill="#28c840" opacity="0.8" class="traffic"
      style="animation-delay:0.6s" />
    <text x="400" y="22" text-anchor="middle" class="t f" font-size="11" fill="#6e7681">git log
      --career</text>
    <rect x="1" y="36" width="798" height="363" fill="url(#crt)" />
    <rect x="1" y="36" width="798" height="363" fill="url(#scan)" />

    <!-- Command — slide in -->
    <text x="24" y="62" class="t sl" style="animation-delay:0.1s" font-size="13">
      <tspan fill="#00e5a0" filter="url(#glow)">$</tspan>
      <tspan fill="#e6edf3"> git log --oneline career</tspan>
    </text>

    <!-- HEAD label with glow pulse -->
    <text x="24" y="86" class="t f" style="animation-delay:0.25s" font-size="9" fill="#00e5a0"
      font-weight="600" letter-spacing="1" filter="url(#glow)"> HEAD <animate
        attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="0.5s" />
    </text>

    <!-- Timeline line — animated draw -->
    <line x1="38" y1="94" x2="38" y2="350" stroke="url(#tl)" stroke-width="1.5"
      stroke-dasharray="256" stroke-dashoffset="256">
      <animate attributeName="stroke-dashoffset" from="256" to="0" dur="1.5s" begin="0.3s"
        fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" />
    </line>

    <!-- Subtle glow trail on timeline -->
    <line x1="38" y1="94" x2="38" y2="350" stroke="#00e5a0" stroke-width="3" opacity="0"
      stroke-dasharray="256" stroke-dashoffset="256">
      <animate attributeName="stroke-dashoffset" from="256" to="0" dur="1.5s" begin="0.3s"
        fill="freeze" />
      <animate attributeName="opacity" values="0;0.08;0.03" dur="1.5s" begin="0.3s" fill="freeze" />
    </line>

    <!-- Entry 1 — LEFT Amazon — slide from right -->
    <g class="sr" style="animation-delay:0.4s">
      <!-- Ripple effect on first node -->
      <circle cx="38" cy="106" r="4" fill="#00e5a0" opacity="0">
        <animate attributeName="r" values="4;18" dur="2s" repeatCount="indefinite" begin="1s" />
        <animate attributeName="opacity" values="0.3;0" dur="2s" repeatCount="indefinite" begin="1s" />
      </circle>
      <circle cx="38" cy="106" r="4" fill="#0d1117" stroke="#00e5a0" stroke-width="1.5"
        filter="url(#nodeGlow)">
        <animate attributeName="r" values="4;5;4" dur="2.5s" repeatCount="indefinite" begin="1s" />
      </circle>
      <text x="56" y="102" class="t" font-size="10" fill="#00e5a0" font-weight="600">Sep 2025</text>
      <text x="56" y="116" class="t" font-size="11" fill="#e6edf3">LEFT Amazon — Ready for the next
        chapter</text>
    </g>

    <!-- Entry 2 — Amazon Pay — slide from left -->
    <g class="sl" style="animation-delay:0.6s">
      <circle cx="38" cy="144" r="3" fill="#0d1117" stroke="#00e5a0" stroke-width="1.5">
        <animate attributeName="r" values="3;4;3" dur="3s" repeatCount="indefinite" begin="1.5s" />
      </circle>
      <text x="56" y="140" class="t" font-size="10" fill="#00e5a0">2023</text>
      <text x="112" y="140" class="t" font-size="11" fill="#e6edf3">Amazon Pay — Trust-Buster
        Champion</text>
      <text x="112" y="156" class="t" font-size="10" fill="#6e7681">Resolved 100+ bugs, cut on-call
        tickets 75%</text>
    </g>

    <!-- Entry 3 — Hotel Booking — slide from right -->
    <g class="sr" style="animation-delay:0.8s">
      <circle cx="38" cy="182" r="3" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"
        filter="url(#nodeGlowB)">
        <animate attributeName="r" values="3;4;3" dur="3s" repeatCount="indefinite" begin="2s" />
      </circle>
      <text x="56" y="178" class="t" font-size="10" fill="#58a6ff">2023</text>
      <text x="112" y="178" class="t" font-size="11" fill="#e6edf3">Hotel Booking Platform — Travel</text>
      <text x="112" y="194" class="t" font-size="10" fill="#6e7681">p90 latency 47%↓ · conversion
        33%↑ · GZIP 95%↓</text>
    </g>

    <!-- Entry 4 — Event-Driven — slide from left -->
    <g class="sl" style="animation-delay:1.0s">
      <circle cx="38" cy="220" r="3" fill="#0d1117" stroke="#00e5a0" stroke-width="1.5">
        <animate attributeName="r" values="3;4;3" dur="3s" repeatCount="indefinite" begin="2.5s" />
      </circle>
      <text x="56" y="216" class="t" font-size="10" fill="#00e5a0">2022</text>
      <text x="112" y="216" class="t" font-size="11" fill="#e6edf3">Event-Driven Architecture —
        Travel</text>
      <text x="112" y="232" class="t" font-size="10" fill="#6e7681">Webhook service (idempotency +
        audit) · 43 bps CPT↓</text>
    </g>

    <!-- Entry 5 — Milestoning — slide from right -->
    <g class="sr" style="animation-delay:1.2s">
      <circle cx="38" cy="258" r="3" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"
        filter="url(#nodeGlowB)">
        <animate attributeName="r" values="3;4;3" dur="3s" repeatCount="indefinite" begin="3s" />
      </circle>
      <text x="56" y="254" class="t" font-size="10" fill="#58a6ff">2022</text>
      <text x="112" y="254" class="t" font-size="11" fill="#e6edf3">Auto-Insurance Milestoning —
        Payments</text>
      <text x="112" y="270" class="t" font-size="10" fill="#6e7681">Multi-stage renewal flows → 60%
        more renewals</text>
    </g>

    <!-- Entry 6 — Joined Amazon — slide from left -->
    <g class="sl" style="animation-delay:1.4s">
      <circle cx="38" cy="296" r="3" fill="#0d1117" stroke="#00e5a0" stroke-width="1.5">
        <animate attributeName="r" values="3;4;3" dur="3s" repeatCount="indefinite" begin="3.5s" />
      </circle>
      <text x="56" y="292" class="t" font-size="10" fill="#00e5a0">Jul 2022</text>
      <text x="126" y="292" class="t" font-size="11" fill="#e6edf3">Joined Amazon as SDE (Full-Time)</text>
    </g>

    <!-- Entry 7 — Intern — slide from right -->
    <g class="sr" style="animation-delay:1.6s">
      <circle cx="38" cy="318" r="3" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"
        filter="url(#nodeGlowB)">
        <animate attributeName="r" values="3;4;3" dur="3s" repeatCount="indefinite" begin="4s" />
      </circle>
      <text x="56" y="314" class="t" font-size="10" fill="#58a6ff">2021-22</text>
      <text x="126" y="314" class="t" font-size="11" fill="#e6edf3">Amazon SDE Intern × 2 — Renewal
        · GraphQL Migration</text>
    </g>

    <!-- Entry 8 — Education — slide from left -->
    <g class="sl" style="animation-delay:1.8s">
      <circle cx="38" cy="340" r="3" fill="#0d1117" stroke="#00e5a0" stroke-width="1.5">
        <animate attributeName="r" values="3;4;3" dur="3s" repeatCount="indefinite" begin="4.5s" />
      </circle>
      <text x="56" y="336" class="t" font-size="10" fill="#00e5a0">2022</text>
      <text x="112" y="336" class="t" font-size="11" fill="#e6edf3">MCA — MNNIT Prayagraj (GPA:
        9.25)</text>
    </g>

    <!-- End marker with fade -->
    <circle cx="38" cy="354" r="2" fill="#30363d" class="f" style="animation-delay:2.0s">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"
        begin="2.5s" />
    </circle>

    <!-- Cursor -->
    <text x="24" y="382" class="t f" style="animation-delay:2.2s" font-size="13" fill="#00e5a0"
      filter="url(#glow)">$</text>
    <rect x="38" y="370" width="2" height="15" rx="1" fill="#00e5a0" opacity="0">
      <animate attributeName="opacity" values="0;0;0.85;0.85;0.12;0.85" dur="1.4s" begin="2.3s"
        repeatCount="indefinite" />
    </rect>
    <circle cx="39" cy="377" r="8" fill="#00e5a0" opacity="0">
      <animate attributeName="opacity" values="0;0.04;0.08;0.04;0" dur="2.8s"
        repeatCount="indefinite" begin="2.3s" />
    </circle>
  </g>
</svg>
